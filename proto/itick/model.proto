syntax = "proto3";

package itick;

import "proto/itick/enum.proto";

option go_package = "wklive/proto/itick;itick";

// 产品类型配置
message ItickCategory {
  int64 id = 1;
  itick.CategoryType category_type = 2;
  string category_code = 3;
  string category_name = 4;
  int64 enabled = 5;
  int64 app_visible = 6;
  int64 sort = 7;
  string icon = 8;
  string remark = 9;
  int64 create_times = 10;
  int64 update_times = 11;
}

// 产品
message ItickProduct {
  int64 id = 1;
  itick.CategoryType category_type = 2;
  string category_code = 3;
  string category_name = 4;
  string market = 5; // binance / hk / us / forex ...
  string symbol = 6; // BTCUSDT / AAPL / EURUSD
  string code = 7;   // 第三方原始 code
  string name = 8;
  string display_name = 9;
  string base_coin = 10;
  string quote_coin = 11;
  int64 enabled = 12;
  int64 app_visible = 13;
  int64 sort = 14;
  string icon = 15;
  string remark = 16;
  int64 create_times = 17;
  int64 update_times = 18;
}

// K线
message Kline {
  string category_code = 1;
  string market = 2;
  string symbol = 3;
  itick.KlineType k_type = 4;
  int64 ts = 5;
  double open = 6;
  double high = 7;
  double low = 8;
  double close = 9;
  double volume = 10;
  double turnover = 11;
}

// 实时报价
message Quote {
  string category_code = 1;
  string symbol = 2;
  double last_price = 3;
  double open_price = 4;
  double high_price = 5;
  double low_price = 6;
  double prev_close_price = 7;
  double change_value = 8;
  double change_rate = 9;
  double volume = 10;
  double turnover = 11;
  int64 quote_ts = 12;
  int64 trade_status = 13;
  string market = 14;
}

message ItickTenantCategory {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 category_id = 3;
  int64 enabled = 4;
  int64 app_visible = 5;
  int64 sort = 6;
  string remark = 7;
  int64 create_times = 8;
  int64 update_times = 9;

  // 冗余返回字段，方便前端展示
  itick.CategoryType category_type = 10;
  string category_name = 11;
  string icon = 12;
}

message ItickTenantProduct {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 product_id = 3;
  int64 enabled = 4;
  int64 app_visible = 5;
  int64 sort = 6;
  string remark = 7;
  int64 create_times = 8;
  int64 update_times = 9;

  // 冗余返回字段，方便前端展示
  itick.CategoryType category_type = 10;
  string category_name = 11;
  string market = 12;
  string symbol = 13;
  string code = 14;
  string name = 15;
  string display_name = 16;
  string base_coin = 17;
  string quote_coin = 18;
  string icon = 19;
}