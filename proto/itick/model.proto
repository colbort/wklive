syntax = "proto3";

package itick;

import "proto/itick/common.proto";

option go_package = "wklive/proto/itick;itick";

// 产品类型配置
message ItickCategory {
  int64 id = 1;
  itick.CategoryType category_type = 2;
  string category_code = 3;
  string category_name = 4;
  bool enabled = 5;
  bool app_visible = 6;
  int64 sort = 7;
  string icon = 8;
  string remark = 9;
  int64 create_time = 10;
  int64 update_time = 11;
}

// 产品
message ItickProduct {
  int64 id = 1;
  itick.CategoryType category_type = 2;
  string market = 3; // binance / hk / us / forex ...
  string symbol = 4; // BTCUSDT / AAPL / EURUSD
  string code = 5; // 第三方原始 code
  string name = 6;
  string display_name = 7;
  string base_coin = 8;
  string quote_coin = 9;
  bool enabled = 10;
  bool app_visible = 11;
  int64 sort = 12;
  string icon = 13;
  string remark = 14;
  int64 create_time = 15;
  int64 update_time = 16;
}

// K线
message Kline {
  string market = 1;
  string symbol = 2;
  itick.KlineType k_type = 3;
  int64 ts = 4;
  double open = 5;
  double high = 6;
  double low = 7;
  double close = 8;
  double volume = 9;
  double turnover = 10;
}

// 深度档位
message DepthLevel {
  double price = 1;
  double volume = 2;
}

// 深度
message Depth {
  string market = 1;
  string symbol = 2;
  repeated DepthLevel asks = 3;
  repeated DepthLevel bids = 4;
  int64 ts = 5;
}

// 实时报价
message Quote {
  string market = 1;
  string symbol = 2;
  double last_price = 3;
  double open_price = 4;
  double high_price = 5;
  double low_price = 6;
  double prev_close_price = 7;
  double change_value = 8;
  double change_rate = 9;
  double volume = 10;
  double turnover = 11;
  int64 quote_ts = 12;
  int64 trade_status = 13;
}


message ItickTenantCategory {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 category_id = 3;
  bool enabled = 4;
  bool app_visible = 5;
  int64 sort = 6;
  string remark = 7;
  int64 create_time = 8;
  int64 update_time = 9;

  // 冗余返回字段，方便前端展示
  itick.CategoryType category_type = 10;
  string category_name = 11;
  string icon = 12;
}

message ItickTenantProduct {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 product_id = 3;
  bool enabled = 4;
  bool app_visible = 5;
  int64 sort = 6;
  string remark = 7;
  int64 create_time = 8;
  int64 update_time = 9;

  // 冗余返回字段，方便前端展示
  itick.CategoryType category_type = 10;
  string category_name = 11;
  string market = 12;
  string symbol = 13;
  string code = 14;
  string name = 15;
  string display_name = 16;
  string base_coin = 17;
  string quote_coin = 18;
  string icon = 19;
}