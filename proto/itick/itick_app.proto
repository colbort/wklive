syntax = "proto3";

package itick;

import "proto/itick/common.proto";
import "proto/itick/model.proto";

option go_package = "wklive/proto/itick;itick";

message AppEmpty {
}

message AppCommonResp {
  itick.RespBase base = 1;
}

// ====================
// 产品类型 & 产品
// ====================

message ListVisibleCategoriesReq {
}

message ListVisibleCategoriesResp {
  itick.RespBase base = 1;
  repeated ItickTenantCategory data = 2;
}

message ListVisibleProductsReq {
  itick.CategoryType category_type = 1;
  string market = 2;
  string keyword = 3;
}

message ListVisibleProductsResp {
  itick.RespBase base = 1;
  repeated ItickTenantProduct data = 2;
}

// ====================
// K线
// ====================

message GetKlineReq {
  string category_code = 1;
  string market = 2;
  string symbol = 3;
  itick.KlineType k_type = 4;
  int64 end_ts = 5;
  int64 limit = 6;
}

message GetKlineResp {
  itick.RespBase base = 1;
  repeated itick.Kline data = 2;
}

// ====================
// 实时报价
// ====================

message GetQuoteReq {
  string market = 1;
  string symbol = 2;
  string category_code = 3;
}

message GetQuoteResp {
  itick.RespBase base = 1;
  itick.Quote data = 2;
}

message MarketSymbol {
  string category_code = 1;
	string market = 2;
	string symbol = 3;
}

message BatchGetQuoteReq {
  string category_code = 1;
  string market = 2;
  repeated MarketSymbol data = 3;
}

message BatchGetQuoteResp {
  itick.RespBase base = 1;
  repeated itick.Quote data = 2;
}

message SubscribeRequest {
  repeated SubscribeTopic topics = 1;
}

message SubscribeTopic {
  string topic = 1; // quote depth tick kline
  string category_code = 2; // crypto forex indices stock future fund
  string symbol = 3; // BTCUSDT / EURUSD / ...
  string market = 4; // BA / US / HK ...
  string interval = 5; // 1m 5m 1h 1d
}

message PushReply {
  string topic = 1;
  string category_code = 2;
  string symbol = 3;
  string market = 4;
  string interval = 5;
  bytes payload = 6;
}

message KlineInterval {
  string name = 1;
  int32 kType = 2;
}

message KlineIntervalsResp {
  repeated KlineInterval data = 1;
}

// ====================
// app service
// ====================
service ItickApp {
  // 获取允许显示的产品类型
  rpc ListVisibleCategories(ListVisibleCategoriesReq) returns (ListVisibleCategoriesResp);

  // 获取允许显示的产品
  rpc ListVisibleProducts(ListVisibleProductsReq) returns (ListVisibleProductsResp);

  // 获取K线
  rpc GetKline(GetKlineReq) returns (GetKlineResp);

  // 获取最新报价
  rpc GetQuote(GetQuoteReq) returns (GetQuoteResp);

  // 批量获取最新报价
  rpc BatchGetQuote(BatchGetQuoteReq) returns (BatchGetQuoteResp);

  // 订阅数据流
  rpc SubscribeStream(SubscribeRequest) returns (stream PushReply);

  // 获取 kline 粒度
  rpc GetKlineIntervals(AppEmpty) returns (KlineIntervalsResp);
}