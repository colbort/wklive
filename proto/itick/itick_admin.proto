syntax = "proto3";

package itick;

import "proto/itick/common.proto";
import "proto/itick/model.proto";

option go_package = "wklive/proto/itick;itick";

message AdminCommonResp {
  itick.RespBase base = 1;
}

// ====================
// 产品类型
// ====================

message CreateCategoryReq {
  itick.CategoryType category_type = 1;
  string category_name = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string icon = 6;
  string remark = 7;
}

message UpdateCategoryReq {
  int64 id = 1;
  string category_name = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string icon = 6;
  string remark = 7;
}

message GetCategoryReq {
  int64 id = 1;
}

message GetCategoryResp {
  itick.RespBase base = 1;
  itick.ItickCategory data = 2;
}

message ListCategoriesReq {
  itick.PageReq page = 1;
  itick.CategoryType category_type = 2;
  int32 status = 3; // 0全部 1启用 2禁用
}

message ListCategoriesResp {
  itick.RespBase base = 1;
  repeated itick.ItickCategory data = 2;
}

message SyncCategoryProductsReq {
  int64 category_id = 1;
}

message SyncCategoryProductsResp {
  itick.RespBase base = 1;
  string task_no = 2;
}

message GetSyncTaskStatusReq {
  string task_no = 1;
}

message GetSyncTaskStatusResp {
  RespBase base = 1;
  string task_no = 2;
  int32 status = 3;
  string message = 4;
}

// ====================
// 产品
// ====================

message CreateProductReq {
  itick.CategoryType category_type = 1;
  string market = 2;
  string symbol = 3;
  string code = 4;
  string name = 5;
  string display_name = 6;
  string base_coin = 7;
  string quote_coin = 8;
  bool enabled = 9;
  bool app_visible = 10;
  int64 sort = 11;
  string icon = 12;
  string remark = 13;
}

message UpdateProductReq {
  int64 id = 1;
  string code = 2;
  string name = 3;
  string display_name = 4;
  string base_coin = 5;
  string quote_coin = 6;
  bool enabled = 7;
  bool app_visible = 8;
  int64 sort = 9;
  string icon = 10;
  string remark = 11;
}

message GetProductReq {
  int64 id = 1;
}

message GetProductResp {
  itick.RespBase base = 1;
  itick.ItickProduct data = 2;
}

message ListProductsReq {
  itick.PageReq page = 1;
  itick.CategoryType category_type = 2;
  string market = 3;
  string keyword = 4;
  int32 status = 5; // 0全部 1启用 2禁用
  int32 visible_status = 6; // 0全部 1显示 2隐藏
}

message ListProductsResp {
  itick.RespBase base = 1;
  repeated itick.ItickProduct data = 2;
}

// ====================
// K线
// ====================

message GetAdminKlineReq {
  string market = 1;
  string symbol = 2;
  itick.KlineType k_type = 3;
  int64 end_ts = 4;
  int64 limit = 5;
}

message GetAdminKlineResp {
  itick.RespBase base = 1;
  repeated itick.Kline data = 2;
}

// ====================
// tenant product category
// ====================

message CreateTenantCategoryReq {
  int64 tenant_id = 1;
  int64 category_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message UpdateTenantCategoryReq {
  int64 id = 1;
  int64 tenant_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message BatchUpsertTenantCategoriesReq {
  int64 tenant_id = 1;
  repeated TenantCategoryItem data = 2;
}

message TenantCategoryItem {
  int64 id = 1;
  int64 category_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message GetTenantCategoryReq {
  int64 id = 1;
  int64 tenant_id = 2;
}

message GetTenantCategoryResp {
  itick.RespBase base = 1;
  itick.ItickTenantCategory data = 2;
}

message ListTenantCategoriesReq {
  itick.PageReq page = 1;
  int64 tenant_id = 2;
  itick.CategoryType category_type = 3;
  int32 status = 4; // 0全部 1启用 2禁用
  int32 visible_status = 5; // 0全部 1显示 2隐藏
}

message ListTenantCategoriesResp {
  itick.RespBase base = 1;
  repeated itick.ItickTenantCategory data = 2;
}

// ====================
// tenant product
// ====================

message CreateTenantProductReq {
  int64 tenant_id = 1;
  int64 product_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message UpdateTenantProductReq {
  int64 id = 1;
  int64 tenant_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message BatchUpsertTenantProductsReq {
  int64 tenant_id = 1;
  repeated TenantProductItem data = 2;
}

message TenantProductItem {
  int64 id = 1;
  int64 product_id = 2;
  bool enabled = 3;
  bool app_visible = 4;
  int64 sort = 5;
  string remark = 6;
}

message GetTenantProductReq {
  int64 id = 1;
  int64 tenant_id = 2;
}

message GetTenantProductResp {
  itick.RespBase base = 1;
  itick.ItickTenantProduct data = 2;
}

message ListTenantProductsReq {
  itick.PageReq page = 1;
  int64 tenant_id = 2;
  itick.CategoryType category_type = 3;
  string market = 4;
  string keyword = 5;
  int32 status = 6; // 0全部 1启用 2禁用
  int32 visible_status = 7; // 0全部 1显示 2隐藏
}

message ListTenantProductsResp {
  itick.RespBase base = 1;
  repeated itick.ItickTenantProduct data = 2;
}

// ====================
// tenant init
// ====================

message InitTenantItickDisplayReq {
  int64 tenant_id = 1;
  bool overwrite = 2; // 是否覆盖已有配置
}

message InitTenantItickDisplayResp {
  itick.RespBase base = 1;
  int64 category_count = 2;
  int64 product_count = 3;
}

// ====================
// admin service
// ====================
service ItickAdmin {
  // 产品类型列表
  rpc ListCategories(ListCategoriesReq) returns (ListCategoriesResp);
  // 产品类型
  rpc CreateCategory(CreateCategoryReq) returns (AdminCommonResp);
  // 更新产品类型仅允许更新名称、状态、排序、图标和备注，产品类型不允许修改
  rpc UpdateCategory(UpdateCategoryReq) returns (AdminCommonResp);
  // 获取产品类型详情
  rpc GetCategory(GetCategoryReq) returns (GetCategoryResp);
  // 同步类型下的产品
  rpc SyncCategoryProducts(SyncCategoryProductsReq) returns (SyncCategoryProductsResp);
  // 获取同步任务状态
  rpc GetSyncTaskStatus(GetSyncTaskStatusReq) returns (GetSyncTaskStatusResp);

  // 产品列表
  rpc ListProducts(ListProductsReq) returns (ListProductsResp);
  // 产品
  rpc CreateProduct(CreateProductReq) returns (AdminCommonResp);
  // 更新产品仅允许更新名称、状态、排序、图标和备注，市场、品种、代码不允许修改
  rpc UpdateProduct(UpdateProductReq) returns (AdminCommonResp);
  // 获取产品详情
  rpc GetProduct(GetProductReq) returns (GetProductResp);

  // K线查看
  rpc GetAdminKline(GetAdminKlineReq) returns (GetAdminKlineResp);

  // 租户产品类型列表
  rpc ListTenantCategories(ListTenantCategoriesReq) returns (ListTenantCategoriesResp);
  // 租户产品类型
  rpc CreateTenantCategory(CreateTenantCategoryReq) returns (AdminCommonResp);
  // 更新租户产品类型仅允许更新状态、排序和备注，关联的产品类型不允许修改
  rpc UpdateTenantCategory(UpdateTenantCategoryReq) returns (AdminCommonResp);
  // 批量更新租户产品类型，已关联的修改状态、排序和备注，未关联的新增，未提交的删除
  rpc BatchUpsertTenantCategories(BatchUpsertTenantCategoriesReq) returns (AdminCommonResp);
  // 获取租户产品类型详情
  rpc GetTenantCategory(GetTenantCategoryReq) returns (GetTenantCategoryResp);

  // 租户产品列表
  rpc ListTenantProducts(ListTenantProductsReq) returns (ListTenantProductsResp);
  // 租户产品
  rpc CreateTenantProduct(CreateTenantProductReq) returns (AdminCommonResp);
  // 更新租户产品仅允许更新状态、排序和备注，关联的产品不允许修改
  rpc UpdateTenantProduct(UpdateTenantProductReq) returns (AdminCommonResp);
  // 批量更新租户产品，已关联的修改状态、排序和备注，未关联的新增，未提交的删除
  rpc BatchUpsertTenantProducts(BatchUpsertTenantProductsReq) returns (AdminCommonResp);
  // 获取租户产品详情
  rpc GetTenantProduct(GetTenantProductReq) returns (GetTenantProductResp);

  // 初始化租户展示配置
  rpc InitTenantItickDisplay(InitTenantItickDisplayReq) returns (InitTenantItickDisplayResp);
}