syntax = "proto3";

package staking;

option go_package = "wklive/proto/staking;staking";

import "proto/staking/enum.proto";

// 质押产品
message StakeProduct {
  int64 id = 1;
  int64 tenant_id = 2;
  string product_no = 3;
  string product_name = 4;
  ProductType product_type = 5;
  string coin_name = 6;
  string coin_symbol = 7;
  string reward_coin_name = 8;
  string reward_coin_symbol = 9;
  string apr = 10;
  int64 lock_days = 11;
  string min_amount = 12;
  string max_amount = 13;
  string step_amount = 14;
  string total_amount = 15;
  string staked_amount = 16;
  string user_limit_amount = 17;
  InterestMode interest_mode = 18;
  RewardMode reward_mode = 19;
  YesNo allow_early_redeem = 20;
  string early_redeem_rate = 21;
  ProductStatus status = 22;
  int64 sort = 23;
  string remark = 24;
  int64 create_user_id = 25;
  int64 update_user_id = 26;
  int64 create_times = 27;
  int64 update_times = 28;
}

// 质押订单
message StakeOrder {
  int64 id = 1;
  int64 tenant_id = 2;
  string order_no = 3;
  int64 uid = 4;
  int64 product_id = 5;
  string product_no = 6;
  string product_name = 7;
  ProductType product_type = 8;
  string coin_name = 9;
  string coin_symbol = 10;
  string reward_coin_name = 11;
  string reward_coin_symbol = 12;
  string stake_amount = 13;
  string apr = 14;
  int64 lock_days = 15;
  InterestMode interest_mode = 16;
  RewardMode reward_mode = 17;
  YesNo allow_early_redeem = 18;
  string early_redeem_rate = 19;
  int64 interest_days = 20;
  int64 start_times = 21;
  int64 end_times = 22;
  int64 last_reward_times = 23;
  int64 next_reward_times = 24;
  string total_reward = 25;
  string pending_reward = 26;
  string redeem_amount = 27;
  string redeem_fee = 28;
  OrderStatus status = 29;
  RedeemType redeem_type = 30;
  int64 redeem_apply_times = 31;
  int64 redeem_times = 32;
  SourceType source = 33;
  string remark = 34;
  int64 create_user_id = 35;
  int64 update_user_id = 36;
  int64 create_times = 37;
  int64 update_times = 38;
}

// 收益记录
message StakeRewardLog {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 order_id = 3;
  string order_no = 4;
  int64 uid = 5;
  int64 product_id = 6;
  string product_name = 7;
  string coin_symbol = 8;
  string reward_coin_symbol = 9;
  string reward_amount = 10;
  string before_reward = 11;
  string after_reward = 12;
  RewardType reward_type = 13;
  RewardStatus reward_status = 14;
  int64 reward_times = 15;
  string remark = 16;
  int64 create_user_id = 17;
  int64 update_user_id = 18;
  int64 create_times = 19;
  int64 update_times = 20;
}

// 赎回记录
message StakeRedeemLog {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 order_id = 3;
  string order_no = 4;
  int64 uid = 5;
  int64 product_id = 6;
  string redeem_no = 7;
  RedeemType redeem_type = 8;
  string stake_amount = 9;
  string redeem_amount = 10;
  string reward_amount = 11;
  string fee_rate = 12;
  string fee_amount = 13;
  RedeemStatus redeem_status = 14;
  int64 redeem_times = 15;
  string remark = 16;
  int64 create_user_id = 17;
  int64 update_user_id = 18;
  int64 create_times = 19;
  int64 update_times = 20;
}
