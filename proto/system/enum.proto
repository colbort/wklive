syntax = "proto3";

package system;

option go_package = "wklive/proto/system;system";

enum SysConfigType {
  UNKNOWN = 0;
  SYSTEM_CORE = 1; // 系统配置
  OBJECT_STORAGE = 2; // 对象存储配置
  ITICK_CONFIG = 3; // ITICK配置
  RECHARGE_CONFIG = 4; // 充值配置
  WITHDRAW_CONFIG = 5; // 提现配置
  EMAIL_CONFIG = 6; // 邮件配置
  PHONE_CONFIG = 7; // 手机短信配置
}

enum MenuType {
  MENU_TYPE_UNKNOWN = 0;
  MENU_TYPE_DIR = 1; // 目录
  MENU_TYPE_MENU = 2; // 菜单
  MENU_TYPE_BUTTON = 3; // 按钮
}

enum RequestMethod {
  REQUEST_METHOD_UNKNOWN = 0;
  REQUEST_METHOD_GET = 1;
  REQUEST_METHOD_POST = 2;
  REQUEST_METHOD_PUT = 3;
  REQUEST_METHOD_DELETE = 4;
}

enum JobStatus {
  JOB_STATUS_DISABLED = 0; // 停用
  JOB_STATUS_ENABLED = 1; // 启用
}

enum UserType {
  USER_TYPE_UNKNOWN = 0; // 未知
  USER_TYPE_SYSTEM_ADMIN = 1; // 系统管理员
  USER_TYPE_TENANT_OWNER = 2; // 租户主账号
  USER_TYPE_TENANT_ADMIN = 3; // 租户管理员
}

enum VerificationCodeChannel {
  VERIFICATION_CODE_CHANNEL_UNKNOWN = 0;
  VERIFICATION_CODE_CHANNEL_EMAIL = 1; // 邮箱
  VERIFICATION_CODE_CHANNEL_PHONE = 2; // 手机短信
}

enum VerificationCodeScene {
  VERIFICATION_CODE_SCENE_UNKNOWN = 0;
  VERIFICATION_CODE_SCENE_REGISTER = 1; // 注册
  VERIFICATION_CODE_SCENE_LOGIN = 2; // 登录
  VERIFICATION_CODE_SCENE_RESET_PASSWORD = 3; // 重置密码
  VERIFICATION_CODE_SCENE_BIND_EMAIL = 4; // 绑定邮箱
  VERIFICATION_CODE_SCENE_BIND_PHONE = 5; // 绑定手机
  VERIFICATION_CODE_SCENE_CHANGE_PASSWORD = 6; // 修改密码
  VERIFICATION_CODE_SCENE_WITHDRAW = 7; // 提现
  VERIFICATION_CODE_SCENE_TEST = 100; // 测试发送
}

enum VerificationCodeStatus {
  VERIFICATION_CODE_STATUS_UNKNOWN = 0;
  VERIFICATION_CODE_STATUS_SUCCESS = 1; // 发送成功
  VERIFICATION_CODE_STATUS_FAILED = 2; // 发送失败
}
