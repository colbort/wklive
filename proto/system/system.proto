syntax = "proto3";

package system;

import "proto/common/common.proto";
import "proto/system/enum.proto";

option go_package = "wklive/proto/system;system";

message Empty {}

message RespBase { common.RespBase base = 1; }

//////////////////////
// Auth / 登录
//////////////////////
message AdminLoginReq {
  string username = 1;
  string password = 2;
  string google_code = 3; // optional
  string ip = 4;
  string ua = 5;
}

message AdminLoginResp {
  common.RespBase base = 1;
  AdminLoginData data = 2;
}

message AdminLoginData {
  string token = 1;
  int64 exp = 2;
  int64 user_id = 3;
  string nickname = 4;
  repeated int64 role_ids = 5;
  common.Enable google2fa_enabled = 6; // 状态,0表示全部，1表示启用，2表示禁用
  int64 perms_ver = 7;
  int64 tenant_id = 8;
  system.UserType user_type = 9;
  common.YesNo is_owner = 10;
  string avatar = 11;
}

message ProfileUser {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
  int64 tenant_id = 5;
  system.UserType user_type = 6;
  common.YesNo is_owner = 7;
  common.Enable google2fa_enabled = 8; // 状态,0表示全部，1表示启用，2表示禁用
}

message SysMenuNode {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  system.MenuType menu_type = 4;
  string path = 5;
  string component = 6;
  string icon = 7;
  int64 sort = 8;
  common.Switch visible = 9; // 显示开关,0表示全部，1表示显示，2表示隐藏
  common.Enable enabled = 10; // 状态,0表示全部，1表示启用，2表示禁用
  string perms = 11;
  repeated SysMenuNode children = 12;
}

message ProfileData {
  ProfileUser user = 1;
  repeated SysMenuNode menus = 2;
  repeated string perms = 3;
  repeated int64 role_ids = 4;
}

message ProfileResp {
  common.RespBase base = 1;
  ProfileData data = 2;
}

message UpdateProfileReq {
  optional string nickname = 1;
  optional string avatar = 2;
  optional string password = 3;
}

//////////////////////
// Menu / Perms
//////////////////////
message SysMenuItem {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  system.MenuType menu_type = 4;
  system.RequestMethod method = 5;
  string path = 6;
  string component = 7;
  string icon = 8;
  int64 sort = 9;
  common.Switch visible = 10; // 显示开关
  common.Enable enabled = 11; // 状态,0表示全部，1表示启用，2表示禁用
  string perms = 12; // 按钮必须有，例如 sys:user:add
}

message SysMenuTreeReq {
  int64 role_id = 1;
}

message SysMenuTreeResp {
  common.RespBase base = 1;
  repeated SysMenuItem data = 2;
}

//////////////////////
// Google 2FA
//////////////////////
message Google2FAInitReq { int64 user_id = 1; }
message Google2FAInitResp {
  common.RespBase base = 1;
  Google2FAInitData data = 2;
}

message Google2FAInitData {
  string secret = 1;
  string otpauth_url = 2;
  string qr_code = 3;
}

message Google2FABindReq {
  int64 user_id = 1;
  string secret = 2;
  string code = 3;
}

message Google2FAEnableReq {
  int64 user_id = 1;
  string code = 2;
}
message Google2FADisableReq {
  int64 user_id = 1;
  string code = 2;
} // 可选强校验
message Google2FAResetReq { int64 user_id = 1; }

//////////////////////
// RBAC - 用户
//////////////////////
message SysUserItem {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  repeated int64 role_ids = 5;
  int64 create_times = 6;
  common.Enable google2fa_enabled = 7; // 状态,0表示全部，1表示启用，2表示禁用
  int64 tenant_id = 8;
  system.UserType user_type = 9;
  common.YesNo is_owner = 10;
  string avatar = 11;
  int64 perms_ver = 12;
  string last_login_ip = 13;
  int64 last_login_at = 14;
  int64 create_by = 15;
  int64 update_times = 16;
}

message SysUserListReq {
  common.PageReq page = 1;
  string keyword = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
}
message SysUserListResp {
  common.RespBase base = 1;
  repeated SysUserItem data = 2;
}

message SysUserDetailReq { int64 id = 1; }
message SysUserDetailResp {
  common.RespBase base = 1;
  SysUserItem data = 2;
}

message SysUserCreateReq {
  string username = 1;
  string password = 2;
  string nickname = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  repeated int64 role_ids = 5;
  int64 tenant_id = 6;
  system.UserType user_type = 7;
  common.YesNo is_owner = 8;
  string avatar = 9;
}
message SysUserUpdateReq {
  int64 id = 1;
  string nickname = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  repeated int64 role_ids = 4;
  int64 tenant_id = 5;
  system.UserType user_type = 6;
  common.YesNo is_owner = 7;
  string avatar = 8;
}
message SysUserDeleteReq { int64 id = 1; }
message ChangeUserStatusReq {
  int64 id = 1;
  common.Enable enabled = 2; // 状态,0表示全部，1表示启用，2表示禁用
}
message ResetUserPwdReq {
  int64 id = 1;
  string password = 2;
}
message AssignUserRolesReq {
  int64 user_id = 1;
  repeated int64 role_ids = 2;
}

//////////////////////
// RBAC - 角色
//////////////////////
message SysRoleItem {
  int64 id = 1;
  string name = 2;
  string code = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  string remark = 5;
  int64 create_times = 6;
  int64 tenant_id = 7;
  int64 update_times = 8;
}
message SysRoleListReq {
  common.PageReq page = 1;
  string keyword = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
}
message SysRoleListResp {
  common.RespBase base = 1;
  repeated SysRoleItem data = 2;
}

message SysRoleCreateReq {
  string name = 1;
  string code = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  string remark = 4;
  int64 tenant_id = 5;
}
message SysRoleUpdateReq {
  int64 id = 1;
  string name = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  string remark = 4;
  int64 tenant_id = 5;
  string code = 6;
}
message SysRoleDeleteReq { int64 id = 1; }
message SysRoleGrantReq {
  int64 role_id = 1;
  repeated int64 menu_ids = 2;
}

message SysRoleGrantDetailReq { int64 id = 1; }
message SysRoleGrantDetailResp {
  common.RespBase base = 1;
  SysRoleGrantDetailData data = 2;
}

message SysRoleGrantDetailData {
  int64 role_id = 1;
  repeated int64 menu_ids = 2;
  repeated string perm_keys = 3;
}

message SysPermItem {
  string perm_key = 1;
  system.RequestMethod method = 2;
  string path = 3;
  string name = 4;
}

message SysPermListResp {
  common.RespBase base = 1;
  repeated SysPermItem data = 2;
}

//////////////////////
// RBAC - 菜单
//////////////////////
message SysMenuCreateReq {
  int64 parent_id = 1;
  string name = 2;
  system.MenuType menu_type = 3;
  system.RequestMethod method = 4;
  string path = 5;
  string component = 6;
  string icon = 7;
  int64 sort = 8;
  common.Switch visible = 9; // 显示开关
  common.Enable enabled = 10; // 状态,0表示全部，1表示启用，2表示禁用
  string perms = 11;
}
message SysMenuUpdateReq {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  system.MenuType menu_type = 4;
  system.RequestMethod method = 5;
  string path = 6;
  string component = 7;
  string icon = 8;
  int64 sort = 9;
  common.Switch visible = 10; // 显示开关,0表示全部，1表示显示，2表示隐藏
  common.Enable enabled = 11; // 状态,0表示全部，1表示启用，2表示禁用
  string perms = 12;
}
message SysMenuDeleteReq { int64 id = 1; }

message SysMenuListReq {
  common.PageReq page = 1;
  string keyword = 2;
  system.MenuType menu_type = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  common.Switch visible = 5; // 显示开关, 0表示全部
}
message SysMenuListResp {
  common.RespBase base = 1;
  repeated SysMenuItem data = 2;
}

//////////////////////
// Logs
//////////////////////
message LoginLogItem {
  int64 id = 1;
  int64 user_id = 2;
  string username = 3;
  string ip = 4;
  string ua = 5;
  int64 success = 6;
  string msg = 7;
  int64 login_at = 8;
}
message LoginLogListReq {
  common.PageReq page = 1;
  string username = 2;
  int64 success = 3;
}
message LoginLogListResp {
  common.RespBase base = 1;
  repeated LoginLogItem data = 2;
}

message OpLogItem {
  int64 id = 1;
  int64 user_id = 2;
  string username = 3;
  system.RequestMethod method = 4;
  string path = 5;
  string req = 6;
  string resp = 7;
  string ip = 8;
  int64 cost_ms = 9;
  int64 create_times = 10;
  int64 update_times = 11;
}
message OpLogListReq {
  common.PageReq page = 1;
  string username = 2;
  system.RequestMethod method = 3;
  string path = 4;
}
message OpLogListResp {
  common.RespBase base = 1;
  repeated OpLogItem data = 2;
}

message SysConfigCreateReq {
  string config_key = 1;
  string config_value = 2;
  string remark = 3;
  int64 tenant_id = 4;
}

message SysConfigUpdateReq {
  int64 id = 1;
  string config_key = 2;
  string config_value = 3;
  string remark = 4;
}

message SysConfigDeleteReq { int64 id = 1; }

message SysConfigItem {
  int64 id = 1;
  string config_key = 2;
  string config_value = 3;
  string remark = 4;
  int64 create_times = 5;
  int64 update_times = 6;
  int64 tenant_id = 7;
}

message SysConfigListReq {
  common.PageReq page = 1;
  string keyword = 2;
  int64 tenant_id = 3;
}
message SysConfigListResp {
  common.RespBase base = 1;
  repeated SysConfigItem data = 2;
}

message SysConfigDetailReq {
  optional int64 id = 1;
  optional system.SysConfigType config_key = 2;
  optional int64 tenant_id = 3;
}

message SysConfigDetailResp {
  common.RespBase base = 1;
  SysConfigItem data = 2;
}

message SysConfigByKeysReq { repeated string config_keys = 1; }
message SysConfigByKeysResp {
  common.RespBase base = 1;
  repeated SysConfigItem data = 2;
}

message SendVerificationCodeReq {
  int64 tenant_id = 1;
  system.VerificationCodeChannel channel = 2;
  string email = 3;
  string phone = 4;
  system.VerificationCodeScene scene = 5;
}

message TestVerificationCodeReq {
  int64 tenant_id = 1;
  system.VerificationCodeChannel channel = 2;
  string email = 3;
  string phone = 4;
  system.VerificationCodeScene scene = 5;
}

message VerificationCodeRecordItem {
  int64 id = 1;
  int64 tenant_id = 2;
  system.VerificationCodeChannel channel = 3;
  string target = 4;
  system.VerificationCodeScene scene = 5;
  string code = 6;
  system.VerificationCodeStatus status = 7;
  string provider = 8;
  string error_message = 9;
  int64 create_times = 10;
  int64 update_times = 11;
}

message VerificationCodeRecordListReq {
  common.PageReq page = 1;
  int64 tenant_id = 2;
  system.VerificationCodeChannel channel = 3;
  string target = 4;
  system.VerificationCodeScene scene = 5;
  system.VerificationCodeStatus status = 6;
}

message VerificationCodeRecordListResp {
  common.RespBase base = 1;
  repeated VerificationCodeRecordItem data = 2;
}

message VerificationCodeRecordDetailReq { int64 id = 1; }

message VerificationCodeRecordDetailResp {
  common.RespBase base = 1;
  VerificationCodeRecordItem data = 2;
}

message LoginUserPermsReq { int64 user_id = 1; }
message LoginUserPermsResp { repeated string perms = 1; }

// 系统定时任务
message SysCronJobItem {
  int64 id = 1;
  string job_name = 2;
  string job_group = 3;
  string invoke_target = 4;
  string cron_expression = 5;
  system.JobStatus status = 6;
  string remark = 7;
  string create_by = 8;
  int64 create_times = 9;
  string update_by = 10;
  int64 update_times = 11;
}

message SysCronJobListReq {
  common.PageReq page = 1;
  string keyword = 2;
  string job_name = 3;
  string job_group = 4;
  system.JobStatus status = 5;
}
message SysCronJobListResp {
  common.RespBase base = 1;
  repeated SysCronJobItem data = 2;
}

message SysCronJobCreateReq {
  string job_name = 1;
  string job_group = 2;
  string invoke_target = 3;
  string cron_expression = 4;
  system.JobStatus status = 5;
  string remark = 6;
}

message SysCronJobUpdateReq {
  int64 id = 1;
  string job_name = 2;
  string job_group = 3;
  string invoke_target = 4;
  string cron_expression = 5;
  system.JobStatus status = 6;
  string remark = 7;
}

message SysCronJobDeleteReq { int64 id = 1; }

message SysCronJobRunReq { int64 id = 1; }

message SysCronJobStartReq { int64 id = 1; }

message SysCronJobStopReq { int64 id = 1; }

message SysCronJobLogItem {
  int64 id = 1;
  int64 job_id = 2;
  string job_name = 3;
  string invoke_target = 4;
  string cron_expression = 5;
  int64 status = 6;
  string message = 7;
  string exception_info = 8;
  int64 start_time = 9;
  int64 end_time = 10;
  int64 create_times = 11;
}

message SysCronJobLogListReq {
  common.PageReq page = 1;
  int64 job_id = 2;
  string job_name = 3;
  string invoke_target = 4;
  int64 status = 5;
}

message SysCronJobHander {
  string invoke_target = 1;
  string job_name = 2;
}

message SysCronJobHandlersResp {
  common.RespBase base = 1;
  repeated SysCronJobHander data = 2;
}

message SysCronJobLogListResp {
  common.RespBase base = 1;
  repeated SysCronJobLogItem data = 2;
}

// 租户管理
message SysTenantItem {
  int64 id = 1;
  string tenant_code = 2;
  string tenant_name = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string remark = 8;
  int64 create_times = 9;
  int64 update_times = 10;
  string login_ip = 11;
  int64 login_time = 12;
  int64 login_count = 13;
  int64 create_by = 14;
  int64 update_by = 15;
}

message SysTenantListReq {
  common.PageReq page = 1;
  string keyword = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  string tenant_code = 4;
  string tenant_name = 5;
  string contact_name = 6;
  string contact_phone = 7;
}
message SysTenantListResp {
  common.RespBase base = 1;
  repeated SysTenantItem data = 2;
}

message SysTenantCreateReq {
  string username = 1;
  string tenant_name = 2;
  string tenant_password = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string remark = 8;
}

message SysTenantUpdateReq {
  int64 id = 1;
  string tenant_name = 2;
  string tenant_password = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string remark = 8;
}

message SysTenantDeleteReq { int64 id = 1; }

message SysTenantDetailReq { optional int64 tenant_id = 1; optional string tenant_code = 2; }

message SysTenantDetailResp {
  common.RespBase base = 1;
  SysTenantItem data = 2;
}

// 客服商户管理
message SysChatMerchantItem {
  int64 id = 1;
  string merchant_code = 2;
  string merchant_name = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string contact_email = 8;
  string remark = 9;
  string create_by = 10;
  int64 create_times = 11;
  string update_by = 12;
  int64 update_times = 13;
}

message SysChatMerchantListReq {
  common.PageReq page = 1;
  string keyword = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  string merchant_code = 4;
  string merchant_name = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string contact_email = 8;
}

message SysChatMerchantListResp {
  common.RespBase base = 1;
  repeated SysChatMerchantItem data = 2;
}

message SysChatMerchantCreateReq {
  string merchant_code = 1;
  string merchant_name = 2;
  common.Enable enabled = 3; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 4;
  string contact_name = 5;
  string contact_phone = 6;
  string contact_email = 7;
  string remark = 8;
  string password = 9; // 客服商户主账号登录密码
}

message SysChatMerchantUpdateReq {
  int64 id = 1;
  string merchant_code = 2;
  string merchant_name = 3;
  common.Enable enabled = 4; // 状态,0表示全部，1表示启用，2表示禁用
  int64 expire_time = 5;
  string contact_name = 6;
  string contact_phone = 7;
  string contact_email = 8;
  string remark = 9;
  string password = 10; // 不为空时重置客服商户主账号密码
}

message SysChatMerchantDeleteReq { int64 id = 1; }

message SysChatMerchantDetailReq {
  optional int64 id = 1;
  optional string merchant_code = 2;
}

message SysChatMerchantDetailResp {
  common.RespBase base = 1;
  SysChatMerchantItem data = 2;
}

//////////////////////
// Service
//////////////////////
service System {
  // P0
  rpc AdminLogin(AdminLoginReq) returns (AdminLoginResp);
  // 获取当前用户信息
  rpc GetProfile(Empty) returns (ProfileResp);
  // 修改头像，密码，昵称
  rpc UpdateProfile(UpdateProfileReq) returns (RespBase);

  // 2FA
  rpc Google2FAInit(Google2FAInitReq) returns (Google2FAInitResp);
  // 绑定Google 2FA
  rpc Google2FABind(Google2FABindReq) returns (RespBase);
  // 启用Google 2FA
  rpc Google2FAEnable(Google2FAEnableReq) returns (RespBase);
  // 禁用Google 2FA
  rpc Google2FADisable(Google2FADisableReq) returns (RespBase);
  // 重置Google 2FA
  rpc Google2FAReset(Google2FAResetReq) returns (RespBase);

  // 用户
  rpc SysUserList(SysUserListReq) returns (SysUserListResp);
  // 获取用户详情
  rpc SysUserDetail(SysUserDetailReq) returns (SysUserDetailResp);
  // 创建系统用户
  rpc SysUserCreate(SysUserCreateReq) returns (RespBase);
  // 更新系统用户
  rpc SysUserUpdate(SysUserUpdateReq) returns (RespBase);
  // 删除系统用户
  rpc SysUserDelete(SysUserDeleteReq) returns (RespBase);
  // 修改用户状态
  rpc ChangeUserStatus(ChangeUserStatusReq) returns (RespBase);
  // 重置用户密码
  rpc ResetUserPwd(ResetUserPwdReq) returns (RespBase);
  // 分配用户角色
  rpc AssignUserRoles(AssignUserRolesReq) returns (RespBase);

  // 角色
  rpc SysRoleList(SysRoleListReq) returns (SysRoleListResp);
  // 创建角色
  rpc SysRoleCreate(SysRoleCreateReq) returns (RespBase);
  // 更新角色
  rpc SysRoleUpdate(SysRoleUpdateReq) returns (RespBase);
  // 删除角色
  rpc SysRoleDelete(SysRoleDeleteReq) returns (RespBase);
  // 角色授权
  rpc SysRoleGrant(SysRoleGrantReq) returns (RespBase);
  // 获取角色授权详情
  rpc SysRoleGrantDetail(SysRoleGrantDetailReq)
      returns (SysRoleGrantDetailResp);
  // 获取权限列表
  rpc SysPermList(Empty) returns (SysPermListResp);
  // 获取菜单树
  rpc GetMenuTree(SysMenuTreeReq) returns (SysMenuTreeResp);
  // 菜单
  rpc SysMenuCreate(SysMenuCreateReq) returns (RespBase);
  // 更新菜单
  rpc SysMenuUpdate(SysMenuUpdateReq) returns (RespBase);
  // 删除菜单
  rpc SysMenuDelete(SysMenuDeleteReq) returns (RespBase);
  // 获取菜单列表
  rpc SysMenuList(SysMenuListReq) returns (SysMenuListResp);
  // 日志
  rpc LoginLogList(LoginLogListReq) returns (LoginLogListResp);
  // 操作日志
  rpc OpLogList(OpLogListReq) returns (OpLogListResp);
  // 新增系统配置
  rpc SysConfigCreate(SysConfigCreateReq) returns (RespBase);
  // 更新系统配置
  rpc SysConfigUpdate(SysConfigUpdateReq) returns (RespBase);
  // 删除系统配置
  rpc SysConfigDelete(SysConfigDeleteReq) returns (RespBase);
  // 获取系统配置列表
  rpc SysConfigList(SysConfigListReq) returns (SysConfigListResp);
  // 获取系统配置详情
  rpc SysConfigDetail(SysConfigDetailReq) returns (SysConfigDetailResp);
  // 获取系统配置根据keys
  rpc SysConfigByKeys(SysConfigByKeysReq) returns (SysConfigByKeysResp);
  // 发送验证码
  rpc SendVerificationCode(SendVerificationCodeReq) returns (RespBase);
  // 测试发送验证码
  rpc TestVerificationCode(TestVerificationCodeReq) returns (RespBase);
  // 验证码发送记录
  rpc VerificationCodeRecordList(VerificationCodeRecordListReq)
      returns (VerificationCodeRecordListResp);
  // 验证码发送记录详情
  rpc VerificationCodeRecordDetail(VerificationCodeRecordDetailReq)
      returns (VerificationCodeRecordDetailResp);
  // 获取登录用户的权限列表
  rpc LoginUserPerms(LoginUserPermsReq) returns (LoginUserPermsResp);
  // 系统定时任务列表
  rpc SysCronJobList(SysCronJobListReq) returns (SysCronJobListResp);
  // 创建系统定时任务
  rpc SysCronJobCreate(SysCronJobCreateReq) returns (RespBase);
  // 更新系统定时任务
  rpc SysCronJobUpdate(SysCronJobUpdateReq) returns (RespBase);
  // 删除系统定时任务
  rpc SysCronJobDelete(SysCronJobDeleteReq) returns (RespBase);
  // 执行一次系统定时任务
  rpc SysCronJobRun(SysCronJobRunReq) returns (RespBase);
  // 开始系统定时任务
  rpc SysCronJobStart(SysCronJobStartReq) returns (RespBase);
  // 停止系统定时任务
  rpc SysCronJobStop(SysCronJobStopReq) returns (RespBase);
  // 获取系统支持的定时任务处理器列表
  rpc SysCronJobHandlers(Empty) returns (SysCronJobHandlersResp);
  // 系统定时任务日志列表
  rpc SysCronJobLogList(SysCronJobLogListReq) returns (SysCronJobLogListResp);
  // 创建租户
  rpc SysTenantCreate(SysTenantCreateReq) returns (RespBase);
  // 更新租户
  rpc SysTenantUpdate(SysTenantUpdateReq) returns (RespBase);
  // 删除租户
  rpc SysTenantDelete(SysTenantDeleteReq) returns (RespBase);
  // 获取租户列表
  rpc SysTenantList(SysTenantListReq) returns (SysTenantListResp);
  // 根据 code 获取租户
  rpc SysTenantDetail(SysTenantDetailReq) returns (SysTenantDetailResp);
  // 创建客服商户
  rpc SysChatMerchantCreate(SysChatMerchantCreateReq) returns (RespBase);
  // 更新客服商户
  rpc SysChatMerchantUpdate(SysChatMerchantUpdateReq) returns (RespBase);
  // 删除客服商户
  rpc SysChatMerchantDelete(SysChatMerchantDeleteReq) returns (RespBase);
  // 获取客服商户列表
  rpc SysChatMerchantList(SysChatMerchantListReq)
      returns (SysChatMerchantListResp);
  // 获取客服商户详情
  rpc SysChatMerchantDetail(SysChatMerchantDetailReq)
      returns (SysChatMerchantDetailResp);
}
