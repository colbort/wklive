syntax = "proto3";

package system;

option go_package = "wklive/proto/system;system";

message Interval {
  string name = 1;
  int32 k_type = 2;
}

// 系统配置
message SystemCore {
  string site_name = 1; // 网站名称
  string site_logo = 2; // 网站LOGO
  bool is_captcha_enabled = 3; // 是否开启验证码
  bool is_register_enabled = 4; // 是否开启注册
  bool is_guest_enabled = 5; // 是否允许游客登录
  bool is_crypto_enabled = 6; // 是否加密接口提交数据
}

// 阿里云 OSS配置
message AliyunOssConfig {
  string endpoint = 1;
  string access_key_id = 2;
  string access_key_secret = 3;
  string bucket_name = 4;
  string bucket_url = 5;
}

// 腾讯云 COS配置
message TencentCosConfig {
  string market = 1;
  string secret_id = 2;
  string secret_key = 3;
  string bucket_name = 4;
  string bucket_url = 5;
}

// MINIO配置
message MinioConfig {
  string endpoint = 1;
  string access_key_id = 2;
  string access_key_secret = 3;
  string bucket_name = 4;
  string bucket_url = 5;
}

// 对象存储配置
message ObjectStorageConfig {
  AliyunOssConfig aliyun_oss = 1;
  TencentCosConfig tencent_cos = 2;
  MinioConfig minio = 3;
  int64 oss_type = 4; // 1阿里云OSS 2腾讯云COS 3MINIO
  string oss_domain = 5; // 对象存储访问域名（可选，优先使用bucket_url）
}

message ItickConfig {
  string api_url = 1; // ITICK API地址
  string api_token = 2; // ITICK API密钥
  string ws_url = 3; // ITICK WebSocket地址
}

message RechargeConfig {
  int64 min_amount = 1; // 最小充值金额，单位：分
  int64 max_amount = 2; // 最大充值金额，单位：分
  int64 fee_rate = 3; // 手续费配置，单位：万分之几，例如：100表示1%
}

message WithdrawConfig {
  int64 min_amount = 1; // 最小提现金额，单位：分
  int64 max_amount = 2; // 最大提现金额，单位：分
  int64 fee_rate = 3; // 手续费配置，单位：万分之几，例如：100表示1%
  int32 daily_limit_per_user = 4; // 每人每天提现次数限制
  int64 daily_amount_limit_per_user = 5; // 每人每天提现金额限制，单位：分
  string allowed_time_range = 6; // 允许提现的时间段，例如：每天9:00-18:00，格式为"09:00-18:00"
  int32 pending_withdrawal_limit_per_user = 7; // 允许未审核在提现数量限制，单位：笔
  int32 free_withdraw_times_per_day = 8; // 每日免费提现次数，0=没有免费提现
}
