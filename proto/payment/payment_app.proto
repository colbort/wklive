syntax = "proto3";

package payment;

import "proto/common/common.proto";
import "proto/payment/enum.proto";
import "proto/payment/model.proto";

option go_package = "wklive/proto/payment;payment";

message AppCommonResp {
  common.RespBase base = 1;
}

// 当前用户累计充值统计
message GetMyRechargeStatReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message GetMyRechargeStatResp {
  common.RespBase base = 1;
  payment.UserRechargeStat stat = 2;
}

// 获取当前登录用户在指定充值场景下可用的充值通道
message ListAvailableRechargeChannelsReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  int64 recharge_amount = 3; // 单位：分
  string currency = 4;
  payment.ClientType client_type = 5;
}

message ListAvailableRechargeChannelsResp {
  common.RespBase base = 1;
  repeated payment.VisiblePayChannel list = 2;
}

// 创建充值订单
message CreateRechargeOrderReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  int64 channel_id = 3;
  int64 recharge_amount = 4; // 单位：分
  string currency = 5;
  string subject = 6;
  string body = 7;
  payment.ClientType client_type = 8;
  string client_ip = 9;
  string biz_order_no = 10;
}

message CreateRechargeOrderResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 查询我的订单详情
message GetMyRechargeOrderReq {
  int64 tenant_id = 1;
  string order_no = 2;
  int64 user_id = 64;
}

message GetMyRechargeOrderResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 查询我的充值订单列表
message ListMyRechargeOrdersReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  common.PageReq page = 3;
  payment.PayOrderStatus status = 4;
  string order_no = 5;
  int64 create_time_start = 6;
  int64 create_time_end = 7;
}

message ListMyRechargeOrdersResp {
  common.RespBase base = 1;
  repeated payment.RechargeOrder list = 2;
}

// 取消未支付订单
message CancelMyRechargeOrderReq {
  int64 tenant_id = 1;
  string order_no = 2;
  int64 user_id = 3;
}

// 轮询订单状态
message QueryMyRechargeOrderStatusReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string order_no = 3;
}

message QueryMyRechargeOrderStatusResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 提现
message CreateWithdrawOrderReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  int64 amount = 3; // 单位：分
  string currency = 4;
  string address = 5; // 提现地址（钱包地址等）
  int64 bank_id = 6; // 银行ID（如果是提现到银行卡）
  string remark = 7;
}

message CreateWithdrawOrderResp {
  common.RespBase base = 1;
  int64 id = 2;
}

// 获取提现订单列表
message ListMyWithdrawOrdersReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  common.PageReq page = 3;
  payment.PayOrderStatus status = 4;
}

message ListMyWithdrawOrdersResp {
  common.RespBase base = 1;
  repeated payment.WithdrawOrder data = 2;
} 

// 获取提现订单详情
message GetMyWithdrawOrderReq {
  int64 id = 1;
  int64 user_id = 2;
}

message GetMyWithdrawOrderResp {
  common.RespBase base = 1;
  payment.WithdrawOrder data = 2;
}

// APP端接口
service PaymentApp {
  // 当前用户累计充值统计（展示用）
  rpc GetMyRechargeStat(GetMyRechargeStatReq) returns (GetMyRechargeStatResp);

  // 获取当前登录用户在指定充值金额下可用的充值通道
  rpc ListAvailableRechargeChannels(ListAvailableRechargeChannelsReq) returns (ListAvailableRechargeChannelsResp);

  // 创建充值订单（服务端需要再次校验通道与用户规则）
  rpc CreateRechargeOrder(CreateRechargeOrderReq) returns (CreateRechargeOrderResp);

  // 查询我的订单详情
  rpc GetMyRechargeOrder(GetMyRechargeOrderReq) returns (GetMyRechargeOrderResp);

  // 查询我的充值订单列表
  rpc ListMyRechargeOrders(ListMyRechargeOrdersReq) returns (ListMyRechargeOrdersResp);

  // 取消未支付订单
  rpc CancelMyRechargeOrder(CancelMyRechargeOrderReq) returns (AppCommonResp);

  // 轮询订单状态
  rpc QueryMyRechargeOrderStatus(QueryMyRechargeOrderStatusReq) returns (QueryMyRechargeOrderStatusResp);

  // 提现
  rpc CreateWithdrawOrder(CreateWithdrawOrderReq) returns (CreateWithdrawOrderResp);

  // 获取提现订单列表
  rpc ListMyWithdrawOrders(ListMyWithdrawOrdersReq) returns (ListMyWithdrawOrdersResp);

  // 获取提现订单详情
  rpc GetMyWithdrawOrder(GetMyWithdrawOrderReq) returns (GetMyWithdrawOrderResp);
}