syntax = "proto3";

package payment;

import "proto/common/common.proto";
import "proto/payment/enum.proto";
import "proto/payment/model.proto";

option go_package = "wklive/proto/payment;payment";

message AppCommonResp { common.RespBase base = 1; }

// 当前用户累计充值统计
message GetMyRechargeStatReq {
}

message GetMyRechargeStatResp {
  common.RespBase base = 1;
  payment.UserRechargeStat stat = 2;
}

// 获取当前登录用户在指定充值场景下可用的充值通道
message ListAvailableRechargeChannelsReq {
  int64 recharge_amount = 1; // 单位：分
  string currency = 2;
  payment.ClientType client_type = 3;
}

message ListAvailableRechargeChannelsResp {
  common.RespBase base = 1;
  repeated payment.VisiblePayChannel list = 2;
}

// 创建充值订单
message CreateRechargeOrderReq {
  int64 channel_id = 1;
  int64 recharge_amount = 2; // 单位：分
  string currency = 3;
  string subject = 4;
  string body = 5;
  payment.ClientType client_type = 6;
  string biz_order_no = 7;
}

message CreateRechargeOrderResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 创建链上充值订单
message CreateCryptoRechargeOrderReq {
  int64 wallet_type = 1;
  string coin = 2;
  common.ChainCode chain_code = 3;
  int64 recharge_amount = 4; // 单位：分
  payment.ClientType client_type = 5;
  string biz_order_no = 6;
}

message CreateCryptoRechargeOrderResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
  payment.CryptoRechargeAddress address = 3;
}

// 查询我的订单详情
message GetMyRechargeOrderReq {
  string order_no = 1;
}

message GetMyRechargeOrderResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 查询我的充值订单列表
message ListMyRechargeOrdersReq {
  common.PageReq page = 1;
  payment.PayOrderStatus status = 2;
  string order_no = 3;
  int64 create_time_start = 4;
  int64 create_time_end = 5;
}

message ListMyRechargeOrdersResp {
  common.RespBase base = 1;
  repeated payment.RechargeOrder list = 2;
}

// 取消未支付订单
message CancelMyRechargeOrderReq {
  string order_no = 1;
}

// 轮询订单状态
message QueryMyRechargeOrderStatusReq {
  string order_no = 1;
}

message QueryMyRechargeOrderStatusResp {
  common.RespBase base = 1;
  payment.RechargeOrder order = 2;
}

// 提现
message CreateWithdrawOrderReq {
  int64 amount = 1; // 单位：分
  string currency = 2;
  string address = 3; // 提现地址（钱包地址等）
  int64 bank_id = 4;  // 银行ID（如果是提现到银行卡）
  string remark = 5;
}

message CreateWithdrawOrderResp {
  common.RespBase base = 1;
  int64 id = 2;
}

// 获取提现订单列表
message ListMyWithdrawOrdersReq {
  common.PageReq page = 1;
  payment.PayOrderStatus status = 2;
}

message ListMyWithdrawOrdersResp {
  common.RespBase base = 1;
  repeated payment.WithdrawOrder data = 2;
}

// 获取提现订单详情
message GetMyWithdrawOrderReq {
  int64 id = 1;
}

message GetMyWithdrawOrderResp {
  common.RespBase base = 1;
  payment.WithdrawOrder data = 2;
}

// 获取/分配我的链上充值地址
message GetMyCryptoRechargeAddressReq {
  int64 wallet_type = 1;
  string coin = 2;
  common.ChainCode chain_code = 3;
}

message GetMyCryptoRechargeAddressResp {
  common.RespBase base = 1;
  payment.CryptoRechargeAddress data = 2;
}

// 我的链上充值地址列表
message ListMyCryptoRechargeAddressesReq {
  int64 wallet_type = 1;
  string coin = 2;
  common.ChainCode chain_code = 3;
}

message ListMyCryptoRechargeAddressesResp {
  common.RespBase base = 1;
  repeated payment.CryptoRechargeAddress data = 2;
}

// 我的链上充值交易列表
message ListMyCryptoRechargeTxsReq {
  common.PageReq page = 1;
  string order_no = 2;
  string coin = 3;
  common.ChainCode chain_code = 4;
  payment.CryptoRechargeTxStatus status = 5;
  int64 create_time_start = 6;
  int64 create_time_end = 7;
}

message ListMyCryptoRechargeTxsResp {
  common.RespBase base = 1;
  repeated payment.CryptoRechargeTx data = 2;
}

// 我的链上充值交易详情
message GetMyCryptoRechargeTxReq {
  int64 id = 1;
  string tx_hash = 2;
}

message GetMyCryptoRechargeTxResp {
  common.RespBase base = 1;
  payment.CryptoRechargeTx data = 2;
}

// APP端接口
service PaymentApp {
  // 当前用户累计充值统计（展示用）
  rpc GetMyRechargeStat(GetMyRechargeStatReq) returns (GetMyRechargeStatResp);

  // 获取当前登录用户在指定充值金额下可用的充值通道
  rpc ListAvailableRechargeChannels(ListAvailableRechargeChannelsReq)
      returns (ListAvailableRechargeChannelsResp);

  // 创建充值订单（服务端需要再次校验通道与用户规则）
  rpc CreateRechargeOrder(CreateRechargeOrderReq)
      returns (CreateRechargeOrderResp);

  // 创建链上充值订单
  rpc CreateCryptoRechargeOrder(CreateCryptoRechargeOrderReq)
      returns (CreateCryptoRechargeOrderResp);

  // 查询我的订单详情
  rpc GetMyRechargeOrder(GetMyRechargeOrderReq)
      returns (GetMyRechargeOrderResp);

  // 查询我的充值订单列表
  rpc ListMyRechargeOrders(ListMyRechargeOrdersReq)
      returns (ListMyRechargeOrdersResp);

  // 取消未支付订单
  rpc CancelMyRechargeOrder(CancelMyRechargeOrderReq) returns (AppCommonResp);

  // 轮询订单状态
  rpc QueryMyRechargeOrderStatus(QueryMyRechargeOrderStatusReq)
      returns (QueryMyRechargeOrderStatusResp);

  // 提现
  rpc CreateWithdrawOrder(CreateWithdrawOrderReq)
      returns (CreateWithdrawOrderResp);

  // 获取提现订单列表
  rpc ListMyWithdrawOrders(ListMyWithdrawOrdersReq)
      returns (ListMyWithdrawOrdersResp);

  // 获取提现订单详情
  rpc GetMyWithdrawOrder(GetMyWithdrawOrderReq)
      returns (GetMyWithdrawOrderResp);

  // 获取/分配我的链上充值地址
  rpc GetMyCryptoRechargeAddress(GetMyCryptoRechargeAddressReq)
      returns (GetMyCryptoRechargeAddressResp);

  // 我的链上充值地址列表
  rpc ListMyCryptoRechargeAddresses(ListMyCryptoRechargeAddressesReq)
      returns (ListMyCryptoRechargeAddressesResp);

  // 我的链上充值交易列表
  rpc ListMyCryptoRechargeTxs(ListMyCryptoRechargeTxsReq)
      returns (ListMyCryptoRechargeTxsResp);

  // 我的链上充值交易详情
  rpc GetMyCryptoRechargeTx(GetMyCryptoRechargeTxReq)
      returns (GetMyCryptoRechargeTxResp);
}
