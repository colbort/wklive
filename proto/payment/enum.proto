syntax = "proto3";

package payment;

option go_package = "wklive/proto/payment;payment";

enum PlatformType {
  PLATFORM_TYPE_UNKNOWN = 0;
  PLATFORM_TYPE_THIRD = 1;  // 三方支付
  PLATFORM_TYPE_BANK = 2;   // 银行转账
  PLATFORM_TYPE_CHAIN = 3;  // 链上支付
  PLATFORM_TYPE_MANUAL = 4; // 人工代收
}

enum RechargeType {
  RECHARGE_TYPE_UNKNOWN = 0;
  RECHARGE_TYPE_CRYPTO = 1; // 虚拟币
  RECHARGE_TYPE_THIRD = 2;  // 三方充值
  RECHARGE_TYPE_BANK = 3;   // 银行卡
  RECHARGE_TYPE_MANUAL = 4; // 人工充值
  RECHARGE_TYPE_OTHER = 5;  // 其他
}

enum CommonStatus {
  COMMON_STATUS_UNKNOWN = 0;
  COMMON_STATUS_ENABLED = 1;
  COMMON_STATUS_DISABLED = 2;
}

enum OpenStatus {
  OPEN_STATUS_UNKNOWN = 0;
  OPEN_STATUS_PENDING_CONFIG = 1;
  OPEN_STATUS_OPENED = 2;
  OPEN_STATUS_AUDITING = 3;
  OPEN_STATUS_REJECTED = 4;
}

enum SceneType {
  SCENE_TYPE_UNKNOWN = 0;
  SCENE_TYPE_APP = 1;
  SCENE_TYPE_H5 = 2;
  SCENE_TYPE_WEB = 3;
  SCENE_TYPE_CASHIER = 4;
  SCENE_TYPE_CHAIN = 5;
}

enum FeeType {
  FEE_TYPE_UNKNOWN = 0;
  FEE_TYPE_RATE = 1;
  FEE_TYPE_FIXED = 2;
}

enum PayOrderStatus {
  PAY_ORDER_STATUS_UNKNOWN = 0;
  PAY_ORDER_STATUS_PENDING = 1;  // 待支付，提现中
  PAY_ORDER_STATUS_PAYING = 2;   // 支付中
  PAY_ORDER_STATUS_SUCCESS = 3;  // 支付成功，提现成功
  PAY_ORDER_STATUS_FAILED = 4;   // 支付失败，提现失败
  PAY_ORDER_STATUS_CLOSED = 5;   // 订单关闭（未支付的订单过期或被用户取消）
  PAY_ORDER_STATUS_REFUNDED = 6; // 已退款
}

enum NotifyProcessStatus {
  NOTIFY_PROCESS_STATUS_UNKNOWN = 0;
  NOTIFY_PROCESS_STATUS_PENDING = 1;
  NOTIFY_PROCESS_STATUS_SUCCESS = 2;
  NOTIFY_PROCESS_STATUS_FAILED = 3;
}

enum SignResult {
  SIGN_RESULT_UNKNOWN = 0;
  SIGN_RESULT_NOT_CHECKED = 1;
  SIGN_RESULT_PASSED = 2;
  SIGN_RESULT_FAILED = 3;
}

enum ClientType {
  CLIENT_TYPE_UNKNOWN = 0;
  CLIENT_TYPE_APP = 1;
  CLIENT_TYPE_H5 = 2;
  CLIENT_TYPE_WEB = 3;
}

enum CryptoRechargeAddressSource {
  CRYPTO_RECHARGE_ADDRESS_SOURCE_UNKNOWN = 0;
  CRYPTO_RECHARGE_ADDRESS_SOURCE_SYSTEM = 1; // 系统生成
  CRYPTO_RECHARGE_ADDRESS_SOURCE_PROVIDER = 2; // 第三方分配
  CRYPTO_RECHARGE_ADDRESS_SOURCE_MANUAL = 3; // 手工导入
}

enum CryptoRechargeAddressType {
  CRYPTO_RECHARGE_ADDRESS_TYPE_UNKNOWN = 0;
  CRYPTO_RECHARGE_ADDRESS_TYPE_EXCLUSIVE = 1; // 用户独享
  CRYPTO_RECHARGE_ADDRESS_TYPE_SHARED_MEMO = 2; // 平台公共地址+memo
}

enum CryptoRechargeAddressStatus {
  CRYPTO_RECHARGE_ADDRESS_STATUS_UNKNOWN = 0;
  CRYPTO_RECHARGE_ADDRESS_STATUS_DISABLED = 1; // 禁用
  CRYPTO_RECHARGE_ADDRESS_STATUS_ENABLED = 2; // 可用
  CRYPTO_RECHARGE_ADDRESS_STATUS_FROZEN = 3; // 冻结
}

enum CryptoRechargeTxStatus {
  CRYPTO_RECHARGE_TX_STATUS_UNKNOWN = 0;
  CRYPTO_RECHARGE_TX_STATUS_PENDING = 1; // 待确认
  CRYPTO_RECHARGE_TX_STATUS_CONFIRMING = 2; // 确认中
  CRYPTO_RECHARGE_TX_STATUS_CONFIRMED = 3; // 已确认
  CRYPTO_RECHARGE_TX_STATUS_FAILED = 4; // 失败
  CRYPTO_RECHARGE_TX_STATUS_CREDITED = 5; // 已入账
}
