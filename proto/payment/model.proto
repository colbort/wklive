syntax = "proto3";

package payment;

import "proto/payment/enum.proto";

option go_package = "wklive/proto/payment;payment";

message PayPlatform {
  int64 id = 1;                                // 平台ID
  string platform_code = 2;                   // 平台编码，如 alipay/wechat/stripe/usdt/bank
  string platform_name = 3;                   // 平台名称
  payment.PlatformType platform_type = 4;     // 类型：1三方支付 2银行转账 3链上支付 4人工代收
  string notify_url = 5;                      // 统一异步通知地址
  string return_url = 6;                      // 默认同步跳转地址
  string icon = 7;                            // 图标
  payment.CommonStatus status = 8;            // 状态：1启用 2停用
  string remark = 9;                          // 备注
  int64 create_times = 10;                    // 创建时间
  int64 update_times = 11;                    // 更新时间
}

message PayProduct {
  int64 id = 1;                            // 产品ID
  int64 platform_id = 2;                   // 平台ID
  string product_code = 3;                 // 产品编码
  string product_name = 4;                 // 产品名称
  payment.SceneType scene_type = 5;        // 场景：1APP 2H5 3WEB 4收银台 5链上
  string currency = 6;                     // 币种
  payment.CommonStatus status = 7;         // 状态：1启用 2停用
  string remark = 8;                       // 备注
  int64 create_times = 9;                  // 创建时间
  int64 update_times = 10;                 // 更新时间
}

message TenantPayPlatform {
  int64 id = 1;                           // 主键ID
  int64 tenant_id = 2;                    // 租户ID
  int64 platform_id = 3;                  // 平台ID
  payment.CommonStatus status = 4;        // 状态：1启用 2停用
  payment.OpenStatus open_status = 5;     // 开通状态：1待配置 2已开通 3审核中 4驳回
  string remark = 6;                      // 备注
  int64 create_times = 7;                 // 创建时间
  int64 update_times = 8;                 // 更新时间
}

message TenantPayAccount {
  int64 id = 1;                            // 账号ID
  int64 tenant_id = 2;                     // 租户ID
  int64 tenant_pay_platform_id = 3;        // 租户开通平台ID
  int64 platform_id = 4;                   // 平台ID
  string account_code = 5;                 // 账号编码
  string account_name = 6;                 // 账号名称
  string app_id = 7;                       // 应用ID
  string merchant_id = 8;                  // 商户号
  string merchant_name = 9;                // 商户名称
  string public_key = 10;                  // 公钥
  string ext_config = 11;                  // 扩展配置(JSON)
  payment.CommonStatus status = 12;        // 状态：1启用 2停用
  int64 is_default = 13;                   // 是否默认账号：0否 1是
  string remark = 14;                      // 备注
  int64 create_times = 15;                 // 创建时间
  int64 update_times = 16;                 // 更新时间
  string api_key_cipher = 17;              // API Key密文
  string api_secret_cipher = 18;           // API Secret密文
  string private_key_cipher = 19;          // 私钥密文
  string cert_cipher = 20;                 // 证书密文
}

message TenantPayChannel {
  int64 id = 1;                            // 通道ID
  int64 tenant_id = 2;                     // 租户ID
  int64 platform_id = 3;                   // 平台ID
  int64 product_id = 4;                    // 产品ID
  int64 account_id = 5;                    // 租户支付账号ID
  string channel_code = 6;                 // 通道编码
  string channel_name = 7;                 // 通道名称
  string display_name = 8;                 // 前端展示名称
  string icon = 9;                         // 图标
  string currency = 10;                    // 币种
  int64 sort = 11;                         // 排序
  int64 visible = 12;                      // 是否显示：0否 1是
  payment.CommonStatus status = 13;        // 状态：1启用 2停用
  int64 single_min_amount = 14;            // 单笔最小金额，单位分
  int64 single_max_amount = 15;            // 单笔最大金额，0表示不限制，单位分
  int64 daily_max_amount = 16;             // 单日最大金额，0表示不限制，单位分
  int64 daily_max_count = 17;              // 单日最大次数，0表示不限制
  payment.FeeType fee_type = 18;           // 手续费类型：1比例 2固定
  string fee_rate = 19;                    // 手续费比例
  int64 fee_fixed_amount = 20;             // 固定手续费，单位分
  string ext_config = 21;                  // 扩展配置(JSON)
  string remark = 22;                      // 备注
  int64 create_times = 23;                 // 创建时间
  int64 update_times = 24;                 // 更新时间
}

message TenantPayChannelRule {
  int64 id = 1;                            // 规则ID
  int64 tenant_id = 2;                     // 租户ID
  int64 channel_id = 3;                    // 通道ID
  string rule_name = 4;                    // 规则名称
  int64 priority = 5;                      // 优先级，越小越优先
  payment.CommonStatus status = 6;         // 状态：1启用 2停用
  int64 single_amount_min = 7;             // 单笔充值最小金额，单位分
  int64 single_amount_max = 8;             // 单笔充值最大金额，0表示不限制，单位分
  int64 user_total_recharge_min = 9;       // 用户累计充值最小金额，单位分
  int64 user_total_recharge_max = 10;      // 用户累计充值最大金额，0表示不限制，单位分
  int64 member_level_min = 11;             // 会员等级最小值
  int64 member_level_max = 12;             // 会员等级最大值，0表示不限制
  int64 kyc_level_min = 13;                // KYC等级最小值
  int64 kyc_level_max = 14;                // KYC等级最大值，0表示不限制
  int64 allow_new_user = 15;               // 是否允许新用户：0否 1是
  int64 allow_old_user = 16;               // 是否允许老用户：0否 1是
  string allow_tags = 17;                  // 允许的用户标签(JSON数组)
  string deny_tags = 18;                   // 禁止的用户标签(JSON数组)
  string remark = 19;                      // 备注
  int64 create_times = 20;                 // 创建时间
  int64 update_times = 21;                 // 更新时间
}

message UserRechargeStat {
  int64 id = 1;                    // 主键ID
  int64 tenant_id = 2;             // 租户ID
  int64 user_id = 3;               // 用户ID
  int64 success_order_count = 4;   // 成功充值笔数
  int64 success_total_amount = 5;  // 成功累计充值金额，单位分
  int64 today_success_amount = 6;  // 今日成功充值金额，单位分
  int64 today_success_count = 7;   // 今日成功充值次数
  int64 first_success_time = 8;    // 首次成功充值时间
  int64 last_success_time = 9;     // 最近成功充值时间
  int64 create_times = 10;         // 创建时间
  int64 update_times = 11;         // 更新时间
}

message RechargeOrder {
  int64 id = 1;                            // 充值订单ID
  int64 tenant_id = 2;                     // 租户ID
  int64 user_id = 3;                       // 用户ID
  string order_no = 4;                     // 平台订单号
  string biz_order_no = 5;                 // 业务订单号
  int64 platform_id = 6;                   // 平台ID
  int64 product_id = 7;                    // 产品ID
  int64 account_id = 8;                    // 账号ID
  int64 channel_id = 9;                    // 通道ID
  string currency = 10;                    // 币种
  int64 order_amount = 11;                 // 订单金额，单位分
  int64 pay_amount = 12;                   // 实际支付金额，单位分
  int64 fee_amount = 13;                   // 手续费金额，单位分
  string subject = 14;                     // 标题
  string body = 15;                        // 描述
  payment.ClientType client_type = 16;     // 客户端类型：1APP 2H5 3WEB
  string client_ip = 17;                   // 客户端IP
  payment.PayOrderStatus status = 18;      // 状态：1待支付 2支付中 3成功 4失败 5已关闭 6已退款
  string third_trade_no = 19;              // 三方交易号
  string third_order_no = 20;              // 三方订单号
  string pay_url = 21;                     // 支付链接
  string qr_content = 22;                  // 二维码内容
  string request_data = 23;                // 请求快照(JSON)
  string response_data = 24;               // 响应快照(JSON)
  string notify_data = 25;                 // 回调数据(JSON)
  int64 expire_time = 26;                  // 过期时间
  int64 paid_time = 27;                    // 支付时间
  int64 notify_time = 28;                  // 回调时间
  int64 close_time = 29;                   // 关闭时间
  string remark = 30;                      // 备注
  int64 create_times = 31;                 // 创建时间
  int64 update_times = 32;                 // 更新时间
}

message PayNotifyLog {
  int64 id = 1;                               // 回调日志ID
  int64 tenant_id = 2;                        // 租户ID
  int64 order_id = 3;                         // 订单ID
  string order_no = 4;                        // 平台订单号
  int64 platform_id = 5;                      // 平台ID
  int64 channel_id = 6;                       // 通道ID
  payment.NotifyProcessStatus notify_status = 7; // 处理状态：1待处理 2成功 3失败
  string notify_body = 8;                     // 回调原文
  payment.SignResult sign_result = 9;         // 验签结果：0未验 1通过 2失败
  string process_result = 10;                 // 处理结果
  string error_message = 11;                  // 错误信息
  int64 notify_time = 12;                     // 回调时间
  int64 create_times = 13;                    // 创建时间
}

message VisiblePayChannel {
  int64 channel_id = 1;              // 通道ID
  string channel_code = 2;           // 通道编码
  string channel_name = 3;           // 通道名称
  string display_name = 4;           // 前端展示名称
  string icon = 5;                   // 图标
  string currency = 6;               // 币种
  int64 single_min_amount = 7;       // 单笔最小金额，单位分
  int64 single_max_amount = 8;       // 单笔最大金额，单位分
  payment.FeeType fee_type = 9;      // 手续费类型：1比例 2固定
  string fee_rate = 10;              // 手续费比例
  int64 fee_fixed_amount = 11;       // 固定手续费，单位分
  int64 platform_id = 12;            // 平台ID
  int64 product_id = 13;             // 产品ID
  int64 account_id = 14;             // 账号ID
}

message WithdrawOrder {
  int64 id = 1;                            // 提现订单ID
  int64 tenant_id = 2;                     // 租户ID
  int64 user_id = 3;                       // 用户ID
  string order_no = 4;                     // 平台订单号
  string biz_order_no = 5;                 // 业务订单号
  string currency = 6;                     // 币种
  int64 amount = 7;                        // 订单金额，单位分
  int64 fee_amount = 8;                    // 手续费金额，单位分
  int64 actual_amount = 9;                 // 实际到账金额，单位分
  payment.ClientType client_type = 10;     // 客户端类型：1APP 2H5 3WEB
  string client_ip = 11;                   // 客户端IP
  payment.PayOrderStatus status = 12;      // 状态：1待处理 2处理中 3成功 4失败 5已关闭
  string third_trade_no = 13;              // 三方交易号
  string third_order_no = 14;              // 三方订单号
  string request_data = 15;                // 请求快照(JSON)
  string response_data = 16;               // 响应快照(JSON)
  string notify_data = 17;                 // 回调数据(JSON)
  int64 process_time = 18;                 // 处理时间
  int64 notify_time = 19;                  // 回调时间
  int64 close_time = 20;                   // 关闭时间
  string remark = 21;                      // 备注
  int64 create_times = 22;                 // 创建时间
  int64 update_times = 23;                 // 更新时间
  int64 platform_id = 24;                  // 平台ID
  int64 product_id = 25;                   // 产品ID
  int64 account_id = 26;                   // 账号ID
  int64 channel_id = 27;                   // 通道ID
}
