syntax = "proto3";

package chat;

import "proto/common/common.proto";
import "proto/chat/enum.proto";
import "proto/chat/model.proto";

option go_package = "wklive/proto/chat;chat";

// 内部客服服务
// 面向业务系统/任务系统；不直接暴露给 chat-ui/chat-admin-ui。
service ChatInternal {
  // 同步客服商户主账号
  rpc SyncChatMerchantUser(SyncChatMerchantUserReq)
      returns (SyncChatMerchantUserResp);
}

message SyncChatMerchantUserReq {
  ChatSyncAction action = 1; // 同步动作
  int64 merchant_id = 2;     // 客服商户ID
  string merchant_code = 3;  // 客服商户编码
  string merchant_name = 4;  // 客服商户名称
  common.Enable enabled = 5; // 启用状态
  int64 expire_time = 6;     // 到期时间
  string contact_name = 7;   // 联系人
  string contact_phone = 8;  // 联系电话
  string contact_email = 9;  // 联系邮箱
  string remark = 10;        // 备注
  string password = 11;      // 明文密码,仅内部同步使用
}

message SyncChatMerchantUserResp {
  common.RespBase base = 1;
  ChatUser data = 2;
}
