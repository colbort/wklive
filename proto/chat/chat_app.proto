syntax = "proto3";

package chat;

import "proto/common/common.proto";
import "proto/chat/enum.proto";
import "proto/chat/model.proto";

option go_package = "wklive/proto/chat;chat";

// 用户端客服服务
service ChatApp {
  // 商户接入鉴权
  rpc AuthChatMerchant(AuthChatMerchantReq) returns (AuthChatMerchantResp);

  // 创建或获取当前会话
  rpc OpenChatSession(OpenChatSessionReq) returns (AppChatSessionResp);

  // 生成会话编号
  rpc GenerateChatSessionNo(GenerateChatSessionNoReq)
      returns (GenerateChatSessionNoResp);

  // 查询我的会话列表
  rpc ListMyChatSessions(ListMyChatSessionsReq) returns (ListChatSessionsResp);

  // 查询会话详情
  rpc GetMyChatSession(GetMyChatSessionReq) returns (AppChatSessionResp);

  // 按商户和用户查询会话
  rpc GetChatSessionByUser(GetChatSessionByUserReq)
      returns (AppChatSessionResp);

  // 查询我的排队信息
  rpc GetMyChatQueueInfo(GetMyChatQueueInfoReq) returns (ChatQueueInfoResp);

  // 发送用户消息
  rpc SendUserMessage(SendUserMessageReq) returns (AppChatMessageResp);

  // 查询会话消息
  rpc ListMyChatMessages(ListMyChatMessagesReq) returns (ListChatMessagesResp);

  // 标记用户侧已读
  rpc MarkUserMessagesRead(MarkUserMessagesReadReq)
      returns (AppMarkMessagesReadResp);

  // 关闭我的会话
  rpc CloseMyChatSession(CloseMyChatSessionReq) returns (AppChatSessionResp);
}

message AuthChatMerchantReq {
  string api_key = 1;    // 对接客服API Key
  string api_secret = 2; // 对接客服API Secret
}

message OpenChatSessionReq {
  ChatSessionSource source = 1; // 来源
  string title = 2;             // 会话标题
  string category = 3;          // 问题分类
  string first_message = 4;     // 首条消息内容
  string sender_nickname = 5;   // 用户昵称快照
  string sender_avatar_url = 6; // 用户头像快照
}

message GenerateChatSessionNoReq {}

message GenerateChatSessionNoResp {
  common.RespBase base = 1;
  string session_no = 2; // 会话编号
}

message ListMyChatSessionsReq {
  ChatSessionStatus status = 1; // 状态,0表示全部
  common.PageReq page = 2;      // 分页
}

message GetMyChatSessionReq {
  string session_no = 1; // 会话编号
}

message GetChatSessionByUserReq {
  int64 merchant_id = 1; // 客服商户ID
  int64 user_id = 2;     // 用户ID
}

message GetMyChatQueueInfoReq {
  string session_no = 1; // 会话编号
  int64 group_id = 2;    // 客服分组ID,0表示默认分组
}

message SendUserMessageReq {
  string session_no = 1;            // 会话编号
  ChatMessageType message_type = 2; // 消息类型
  string content = 3;               // 文本内容
    /**
   * 资源URL
   * 图片、文件、视频、音频等使用
   */
  string url = 4;

  /**
   * 文件名
   */
  string file_name = 5;

  /**
   * 文件大小，单位 byte
   */
  int64 file_size = 6;

  /**
   * 文件类型 / MIME
   * 例如 image/png、application/pdf
   */
  string mime_type = 7;
  string sender_nickname = 8;       // 用户昵称快照
  string sender_avatar_url = 9;     // 用户头像快照
}

message ListMyChatMessagesReq {
  string session_no = 1;   // 会话编号
  common.PageReq page = 2; // 分页
}

message MarkUserMessagesReadReq {
  string session_no = 1;     // 会话编号
  int64 last_message_id = 2; // 最后已读消息ID,0表示全部
}

message CloseMyChatSessionReq {
  string session_no = 1;   // 会话编号
  string close_reason = 2; // 结束原因
}

message ListChatSessionsResp {
  common.RespBase base = 1;
  repeated ChatSession data = 2;
}

message ListChatMessagesResp {
  common.RespBase base = 1;
  repeated ChatMessage data = 2;
}

message ChatQueueInfoResp {
  common.RespBase base = 1;
  ChatQueueInfo data = 2;
}

message AppChatSessionResp {
  common.RespBase base = 1;
  ChatSession data = 2;
}

message AppChatMessageResp {
  common.RespBase base = 1;
  ChatMessage data = 2;
}

message AppMarkMessagesReadResp { common.RespBase base = 1; }

message AuthChatMerchantResp {
  common.RespBase base = 1;
  ChatMerchant data = 2;
}
