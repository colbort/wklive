syntax = "proto3";

package chat;

import "proto/common/common.proto";
import "proto/chat/enum.proto";
import "proto/chat/model.proto";

option go_package = "wklive/proto/chat;chat";

// 用户端客服服务
// 面向 chat-ui/chat-api。merchant_id/user_id 从 token/context 获取，不允许前端自己传。
service ChatApp {
  // 商户接入鉴权
  rpc AuthChatMerchant(AuthChatMerchantReq) returns (AuthChatMerchantResp);

  // 创建或获取当前未关闭会话；服务端负责生成 session_no
  rpc OpenChatSession(OpenChatSessionReq) returns (AppChatSessionResp);

  // 生成会话编号
  rpc GenerateChatSessionNo(GenerateChatSessionNoReq)
      returns (GenerateChatSessionNoResp);

  // 按商户和用户查询会话
  rpc GetChatSessionByUser(GetChatSessionByUserReq)
      returns (AppChatSessionResp);

  // 发送用户消息
  rpc SendUserMessage(SendUserMessageReq) returns (AppChatMessageResp);

  // 发送用户输入状态
  rpc SendUserTyping(SendUserTypingReq) returns (AppCommonResp);

  // 查询会话消息
  rpc ListMyChatMessages(ListMyChatMessagesReq) returns (AppListChatMessagesResp);

  // 关闭我的会话
  rpc CloseMyChatSession(CloseMyChatSessionReq) returns (AppChatSessionResp);

  // 提交会话评价
  rpc SubmitChatSatisfaction(SubmitChatSatisfactionReq)
      returns (AppChatSatisfactionResp);

  // 订阅客服消息事件流
  rpc AppSubscribeStream(AppChatSubscribeRequest) returns (stream ChatMessageEvent);
}

message AppCommonResp {
  common.RespBase base = 1;
}

message AuthChatMerchantReq {
  string api_key = 1;           // 对接客服 API Key
  string api_secret = 2;        // 对接客服 API Secret，仅外部业务方服务端持有
  string external_user_id = 3;  // 外部业务系统用户ID/访客ID，用于映射客服用户
  string nickname = 4;          // 用户昵称快照
  string avatar_url = 5;        // 用户头像快照
  ChatSessionSource source = 6; // 来源：APP/WEB/H5 等
  int64 expire_seconds = 7;     // chatToken有效期，0表示使用服务端默认值
  string extra = 8;             // 扩展JSON，例如设备、渠道、落地页参数
}

message AuthChatMerchantData {
  string chat_token = 1;        // chat-ui 建立 WS 或调用用户接口时携带的 token
  int64 expire_time = 2;        // chatToken 过期时间戳，毫秒
  int64 merchant_id = 3;        // 客服商户ID
  int64 user_id = 4;            // 客服系统内部用户ID/访客ID
  string external_user_id = 5;  // 外部业务系统用户ID/访客ID
  ChatMerchant merchant = 6;    // 商户接入信息，不包含 api_secret
}

message AuthChatMerchantResp {
  common.RespBase base = 1;
  AuthChatMerchantData data = 2;
}

message GenerateChatSessionNoReq {
  ChatSessionSource source = 1; // 来源，可为空
  int64 merchant_id = 2;        // 商户ID；一般可从 chatToken/context 获取
  int64 user_id = 3;            // 客服系统内部用户ID；一般可从 chatToken/context 获取
  bool is_guest = 4;            // 是否游客
}

message GenerateChatSessionNoResp {
  common.RespBase base = 1;
  string session_no = 2; // 会话编号
  int64 create_time = 3; // 生成时间，毫秒时间戳
}

message GetChatSessionByUserReq {
  int64 merchant_id = 1;        // 商户ID；一般可从 chatToken/context 获取
  int64 user_id = 2;            // 客服系统内部用户ID
  string external_user_id = 3;  // 外部业务系统用户ID/访客ID，可选
  ChatSessionStatus status = 4; // 过滤状态，UNKNOWN 表示优先返回未关闭会话
  bool include_closed = 5;      // 是否允许返回已关闭会话，默认 false
}

message OpenChatSessionReq {
  ChatSessionSource source = 1; // 来源
  int64 merchant_id = 2;        // 客服商户ID
  int64 user_id = 3;            // 用户ID
  bool is_guest = 4;            // 是否游客
  string session_no = 5;        // 会话
  string ext_json = 6;
}

message SendUserMessageReq {
  string session_no = 1;            // 会话编号
  string client_message_id = 2;     // 客户端消息ID,用于幂等/回执
  ChatMessageType message_type = 3; // 消息类型
  string content = 4;               // 文本内容
  string url = 5;                   // 资源URL
  string file_name = 6;             // 文件名
  int64 file_size = 7;              // 文件大小(byte)
  string mime_type = 8;             // MIME类型
  int32 width = 9;                  // 图片/视频宽度
  int32 height = 10;                // 图片/视频高度
  int32 duration = 11;              // 音频/视频时长(秒)
  string extra = 12;                // 扩展JSON
  ChatMessageUser sender = 13;      // 用户端
  int64 merchant_id = 14;           // 
  ChatMessage message = 15;         // 游客/临时消息，可选
  ChatSession session = 16;         // 游客/临时会话快照，可选
  int64 ttl_seconds = 17;           // 游客临时消息 TTL，0 使用默认 TTL
  bool publish_only = 18;           // 仅发布事件，不写入临时消息
  bool is_guest = 19;               // 是否游客/临时会话
  ChatEventType event_type = 20;    // 游客/临时消息事件类型
}

message SendUserTypingReq {
  int64 merchant_id = 1;        // 客服商户ID
  int64 user_id = 2;            // 用户ID
  bool is_guest = 3;            // 是否游客/临时会话
  ChatTypingPayload typing = 4; // 输入状态 payload
}

message AppUpsertTransientChatSessionReq {
  ChatSession session = 1;
  int64 ttl_seconds = 2;
}

message AppGetTransientChatSessionReq {
  int64 merchant_id = 1;
  string session_no = 2;
}

message AppPageTransientChatSessionsReq {
  int64 merchant_id = 1;
  int64 user_id = 2;
  int64 agent_id = 3;
  ChatSessionStatus status = 4;
  common.PageReq page = 5;
}

message AppDeleteTransientChatSessionReq {
  int64 merchant_id = 1;
  string session_no = 2;
  ChatEventType event_type = 3;
  string event_message = 4;
  int64 user_id = 5;
  int64 agent_id = 6;
}

message AppDeleteTransientChatSessionResp { common.RespBase base = 1; }

message ListMyChatMessagesReq {
  string session_no = 1;            // 会话编号
  common.PageReq page = 2;          // 分页
  int64 merchant_id = 3;            // 游客临时会话商户ID
  ChatSenderType sender_type = 4;   // 游客临时消息发送者过滤
  bool is_guest = 5;                // 是否游客/临时会话
}

message CloseMyChatSessionReq {
  string session_no = 1;                         // 会话编号
  ChatSessionCloseReason close_reason_type = 2;  // 结束原因类型
  string close_reason = 3;                       // 结束原因描述
  int64 merchant_id = 4;
  int64 user_id = 5;
  bool is_guest = 6;                // 是否游客/临时会话
}

message SubmitChatSatisfactionReq {
  string session_no = 1; // 会话编号
  int32 score = 2;       // 满意度评分:1-5
  string content = 3;    // 评价内容
  string tags = 4;       // 评价标签,逗号分隔
  int64 merchant_id = 5;
  int64 user_id = 6;
  bool is_guest = 7;     // 是否游客/临时会话
}

message AppChatSubscribeRequest {
  int64 merchant_id = 1;
  int64 user_id = 2;
  int64 agent_id = 3;
  string session_no = 4;
  bool is_guest = 5;
  bool admin = 6;
}

message AppListChatMessagesResp {
  common.RespBase base = 1;
  repeated ChatMessage data = 2;
}

message AppChatSessionResp {
  common.RespBase base = 1;
  ChatSession data = 2;
}

message AppChatMessageResp {
  common.RespBase base = 1;
  ChatMessage data = 2;
}

message AppPageTransientChatSessionsResp {
  common.RespBase base = 1;
  repeated ChatSession data = 2;
}

message AppChatSatisfactionResp {
  common.RespBase base = 1;
  ChatSatisfaction data = 2;
}
