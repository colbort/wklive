syntax = "proto3";

package chat;

import "google/protobuf/struct.proto";
import "proto/common/common.proto";
import "proto/chat/enum.proto";

option go_package = "wklive/proto/chat;chat";

// 客服用户/商户账号
message ChatUser {
  int64 id = 1;               // 主键ID
  int64 merchant_id = 2;      // 客服商户ID
  ChatUserType user_type = 3; // 用户类型
  common.YesNo is_owner = 4;  // 是否商户主账号
  string username = 5;        // 登录账号
  string nickname = 6;        // 昵称
  string avatar_url = 7;      // 头像URL
  string mobile = 8;          // 手机号
  string email = 9;           // 邮箱
  common.Enable enabled = 10; // 启用状态
  int64 last_login_time = 11; // 最后登录时间戳(毫秒)
  string remark = 12;         // 备注
  int64 create_times = 13;    // 创建时间戳(毫秒)
  int64 update_times = 14;    // 更新时间戳(毫秒)
  string password = 15;       // bcrypt密码,仅内部使用
  string last_login_ip = 16;  // 最后登录IP
}

// 客服商户接入信息
message ChatMerchant {
  int64 merchant_id = 1;     // 客服商户ID
  string api_key = 2;        // 对接客服API Key
  common.Enable enabled = 3; // 启用状态
  int64 expire_time = 4;     // 到期时间戳(毫秒)
  int64 create_times = 5;    // 创建时间戳(毫秒)
  int64 update_times = 6;    // 更新时间戳(毫秒)
}

// 客服坐席
message ChatAgent {
  int64 id = 1;                    // 主键ID
  int64 merchant_id = 2;           // 客服商户ID
  int64 chat_user_id = 3;          // 客服用户ID
  string agent_no = 4;             // 坐席编号
  string welcome_message = 5;      // 欢迎语
  ChatAgentStatus status = 6;      // 在线状态
  int32 max_session_count = 7;     // 最大同时接待数
  int32 current_session_count = 8; // 当前接待数
  int64 last_active_time = 9;      // 最后活跃时间戳(毫秒)
  string remark = 10;              // 备注
  int64 create_times = 11;         // 创建时间戳(毫秒)
  int64 update_times = 12;         // 更新时间戳(毫秒)
  int64 group_id = 13;             // 客服分组ID
  common.YesNo auto_online = 14;    // 登录是否自动上线
}

// 客服会话
message ChatSession {
  int64 id = 1;                         // 主键ID
  string session_no = 2;                // 会话编号
  int64 merchant_id = 3;                // 客服商户ID
  int64 user_id = 4;                    // 用户ID
  ChatSessionSource source = 5;         // 来源
  ChatSessionStatus status = 6;         // 状态
  ChatSessionPriority priority = 7;     // 优先级
  int64 agent_id = 8;                   // 当前坐席ID
  string title = 9;                     // 会话标题
  string category = 10;                 // 问题分类
  string last_message = 11;             // 最后一条消息摘要
  ChatSenderType last_sender_type = 12; // 最后一条消息发送方
  int64 last_message_time = 13;         // 最后一条消息时间戳(毫秒)
  int32 user_unread_count = 14;         // 用户未读数
  int32 agent_unread_count = 15;        // 坐席未读数
  int64 close_time = 16;                // 结束时间戳(毫秒)
  string close_reason = 17;             // 结束原因
  google.protobuf.Struct ext_json = 18; // 扩展信息
  int64 create_times = 19;              // 创建时间戳(毫秒)
  int64 update_times = 20;              // 更新时间戳(毫秒)
  int64 group_id = 21;                  // 目标客服分组ID
  string last_message_no = 22;          // 最后一条消息编号
  bool is_guest = 23;                   // 
  string avatar_url = 24;               // 
}

// 客服消息
message ChatMessageUser {
  int64 id = 1;            // 发送方ID
  ChatSenderType type = 2; // 发送方类型
  string nickname = 3;     // 昵称
  string avatar_url = 4;   // 头像URL
}

/**
 * 聊天消息主体
 */
message ChatMessage {
  string id = 1;                         // Mongo ObjectID
  string message_no = 2;                 // 消息编号
  string session_no = 3;                 // 会话编号
  int64 merchant_id = 4;                 // 客服商户ID
  ChatMessageUser sender = 5;            // 发送方
  ChatMessageUser receiver = 6;          // 接收方
  ChatMessageType message_type = 7;      // 消息内容类型
  string content = 8;                    // 文本内容
  string url = 9;                        // 资源URL
  string file_name = 10;                 // 文件名
  string mime_type = 11;                 // MIME类型
  int64 file_size = 12;                  // 文件大小(byte)
  int32 width = 13;                      // 图片/视频宽度
  int32 height = 14;                     // 图片/视频高度
  int32 duration = 15;                   // 音频/视频时长(秒)
  ChatMessageStatus status = 16;         // 消息状态
  google.protobuf.Struct payload = 17;   // 扩展 payload
  int64 read_time = 18;                  // 已读时间戳(毫秒)
  int64 create_times = 19;               // 创建时间戳(毫秒)
  int64 update_times = 20;               // 更新时间戳(毫秒)
}

// 客服排队信息
message ChatQueueInfo {
  int64 merchant_id = 1;           // 客服商户ID
  string session_no = 2;           // 会话编号
  int64 user_id = 3;               // 用户ID
  int64 group_id = 4;              // 客服分组ID
  int32 position = 5;              // 当前会话排队位置,1表示下一位
  int32 waiting_count = 6;         // 当前等待总数
  int64 estimate_wait_seconds = 7; // 预计等待秒数
  string message = 8;              // 给用户展示的排队提示
  int64 update_times = 9;          // 更新时间戳(毫秒)
}

// 输入状态事件
message ChatTyping {
  string session_no = 1;           // 会话编号
  int64 merchant_id = 2;           // 客服商户ID
  int64 user_id = 3;               // 用户ID
  int64 agent_id = 4;              // 坐席ID
  ChatSenderType sender_type = 5;  // 发送方类型
  string message = 6;              // 提示文案
  int64 created_at = 7;            // 事件创建时间戳(毫秒)
}

// 消息回执 / 消息操作事件
message ChatMessageReceipt {
  string session_no = 1;           // 会话编号
  string message_no = 2;           // 消息编号
  int64 merchant_id = 3;           // 客服商户ID
  int64 user_id = 4;               // 用户ID
  int64 agent_id = 5;              // 坐席ID
  ChatSenderType sender_type = 6;  // 操作方类型
  int64 created_at = 7;            // 事件创建时间戳(毫秒)
}

// 心跳事件
message ChatHeartbeat {
  int64 time = 1;                  // 服务端时间戳(毫秒)
}

// 错误事件
message ChatEventError {
  int32 code = 1;                  // 错误码
  string msg = 2;                  // 错误信息
  string session_no = 3;           // 会话编号
  int64 merchant_id = 4;           // 客服商户ID
  int64 created_at = 5;            // 事件创建时间戳(毫秒)
}

// 评价邀请事件
message ChatEvaluationInvite {
  string session_no = 1;           // 会话编号
  int64 merchant_id = 2;           // 客服商户ID
  int64 user_id = 3;               // 用户ID
  int64 agent_id = 4;              // 坐席ID
  string content = 5;              // 邀请文案
  int64 created_at = 6;            // 事件创建时间戳(毫秒)
}

/**
 * WebSocket / 推送统一事件
 */
message ChatMessageEvent {
  // 业务状态码
  // 例如：0 成功，非 0 表示错误
  int32 code = 1;

  // 提示信息
  string msg = 2;

  // 事件类型
  ChatEventType event_type = 3;

  // 事件创建时间戳，毫秒
  int64 created_at = 4;

  oneof payload {
    // 普通聊天消息
    // 对应：
    // CHAT_EVENT_TYPE_MESSAGE
    ChatMessage message = 10;

    // 会话信息
    // 对应：
    // CHAT_EVENT_TYPE_SESSION_CLOSE
    ChatSession session = 11;

    // 系统通知
    // 对应：
    // CHAT_EVENT_TYPE_SYSTEM_NOTICE
    ChatSystemNoticePayload system_notice = 12;

    // 用户进入 / 离开
    // 对应：
    // CHAT_EVENT_TYPE_USER_JOIN
    // CHAT_EVENT_TYPE_USER_LEAVE
    ChatUserStatePayload user_state = 13;

    // 排队 / 等待服务列表变化
    // 对应：
    // CHAT_EVENT_TYPE_QUEUE_UPDATE
    ChatQueuePayload queue = 14;

    // 坐席接待 / 坐席离开
    // 对应：
    // CHAT_EVENT_TYPE_AGENT_ACCEPTED
    // CHAT_EVENT_TYPE_AGENT_LEAVE
    ChatAgentPayload agent = 15;

    // 会话转接
    // 对应：
    // CHAT_EVENT_TYPE_TRANSFER_REQUEST
    // CHAT_EVENT_TYPE_TRANSFER_ACCEPT
    // CHAT_EVENT_TYPE_TRANSFER_REJECT
    ChatTransferPayload transfer = 16;

    // 评价
    // 对应：
    // CHAT_EVENT_TYPE_EVALUATION_INVITE
    // CHAT_EVENT_TYPE_EVALUATION_SUBMIT
    ChatEvaluationPayload evaluation = 17;

    // 正在输入
    // 对应：
    // CHAT_EVENT_TYPE_TYPING
    ChatTypingPayload typing = 18;

    // 消息状态回执
    // 对应：
    // CHAT_EVENT_TYPE_MESSAGE_DELIVERED
    // CHAT_EVENT_TYPE_MESSAGE_READ
    ChatMessageReceiptPayload receipt = 19;

    // 消息操作
    // 对应：
    // CHAT_EVENT_TYPE_MESSAGE_RECALL
    // CHAT_EVENT_TYPE_MESSAGE_DELETE
    ChatMessageOperatePayload message_operate = 20;

    // 心跳
    // 对应：
    // CHAT_EVENT_TYPE_HEARTBEAT
    ChatHeartbeatPayload heartbeat = 21;

    // 错误事件
    // 对应：
    // CHAT_EVENT_TYPE_ERROR
    ChatErrorPayload error = 22;
  }
}

/**
 * 系统通知 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_SYSTEM_NOTICE
 */
message ChatSystemNoticePayload {
  // 会话 ID
  string session_no = 1;

  // 通知标题，可选
  string title = 2;

  // 通知内容
  string content = 3;

  // 通知等级
  // 例如：info、warning、error
  string level = 4;

  // 是否需要展示在聊天记录中
  bool show_in_chat = 5;
}

/**
 * 用户状态 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_USER_JOIN
 * CHAT_EVENT_TYPE_USER_LEAVE
 */
message ChatUserStatePayload {
  // 会话 ID
  string session_no = 1;

  // 用户 ID
  string user_id = 2;

  // 用户昵称
  string user_name = 3;

  // 用户头像
  string avatar = 4;

  // 是否在线
  bool online = 5;

  // 来源
  ChatSessionSource source = 6;
}

/**
 * 排队动作
 */
enum ChatQueueAction {
  CHAT_QUEUE_ACTION_UNKNOWN = 0;

  // 进入等待列表
  CHAT_QUEUE_ACTION_JOIN = 1;

  // 等待信息更新
  CHAT_QUEUE_ACTION_UPDATE = 2;

  // 用户取消等待
  CHAT_QUEUE_ACTION_CANCEL = 3;

  // 已被坐席接待，从等待列表移除
  CHAT_QUEUE_ACTION_ACCEPTED = 4;
}

/**
 * 排队 / 等待服务列表 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_QUEUE_UPDATE
 */
message ChatQueuePayload {
  // 会话 ID
  string session_no = 1;

  // 用户 ID
  int64 user_id = 2;

  // 用户昵称
  string nickname = 3;

  // 排队动作
  ChatQueueAction queue_action = 4;

  // 当前排队位置
  int64 queue_position = 5;

  // 当前等待人数
  int64 waiting_count = 6;

  // 预计等待秒数
  int64 estimated_wait_seconds = 7;

  // 会话状态
  ChatSessionStatus session_status = 8;

  // 触发时间，毫秒
  int64 action_time = 9;
}

/**
 * 坐席相关 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_AGENT_ACCEPTED
 * CHAT_EVENT_TYPE_AGENT_LEAVE
 */
message ChatAgentPayload {
  // 会话 ID
  string session_no = 1;

  // 坐席 ID
  string agent_id = 2;

  // 坐席名称
  string agent_name = 3;

  // 坐席头像
  string agent_avatar = 4;

  // 坐席状态
  ChatAgentStatus agent_status = 5;

  // 分配 / 接待方式
  // 你的业务里主要是 MANUAL
  ChatAssignType assign_type = 6;

  // 会话状态
  ChatSessionStatus session_status = 7;

  // 备注
  string remark = 8;

  // 操作时间，毫秒
  int64 action_time = 9;
}

/**
 * 转接 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_TRANSFER_REQUEST
 * CHAT_EVENT_TYPE_TRANSFER_ACCEPT
 * CHAT_EVENT_TYPE_TRANSFER_REJECT
 */
message ChatTransferPayload {
  // 会话 ID
  string session_no = 1;

  // 发起转接的坐席 ID
  string from_agent_id = 2;

  // 发起转接的坐席名称
  string from_agent_name = 3;

  // 目标坐席 ID
  string to_agent_id = 4;

  // 目标坐席名称
  string to_agent_name = 5;

  // 转接原因
  string reason = 6;

  // 拒绝原因
  // TRANSFER_REJECT 时使用
  string reject_reason = 7;

  // 转接时间，毫秒
  int64 action_time = 8;
}

/**
 * 评价 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_EVALUATION_INVITE
 * CHAT_EVENT_TYPE_EVALUATION_SUBMIT
 */
message ChatEvaluationPayload {
  // 会话 ID
  string session_no = 1;

  // 用户 ID
  string user_id = 2;

  // 坐席 ID
  string agent_id = 3;

  // 评价 ID
  string evaluation_id = 4;

  // 评分
  // 例如：1 - 5
  int32 rating = 5;

  // 评价标签
  repeated string tags = 6;

  // 评价内容
  string comment = 7;

  // 是否已提交
  bool submitted = 8;

  // 评价时间，毫秒
  int64 evaluated_at = 9;
}

/**
 * 正在输入 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_TYPING
 */
message ChatTypingPayload {
  // 会话 ID
  string session_no = 1;

  // 正在输入的人
  string sender_id = 2;

  // 发送方类型
  ChatSenderType sender_type = 3;

  // 显示文案
  // 例如：对方正在输入...
  string text = 4;

  // 触发时间，毫秒
  int64 action_time = 5;
}

/**
 * 消息回执 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_MESSAGE_DELIVERED
 * CHAT_EVENT_TYPE_MESSAGE_READ
 */
message ChatMessageReceiptPayload {
  // 会话 ID
  string session_no = 1;

  // 消息 ID
  string message_no = 2;

  // 消息发送方 ID
  int64 sender_id = 3;

  // 回执触发方 ID
  // 例如：谁收到了、谁读了
  int64 operator_id = 4;

  // 回执触发方类型
  ChatSenderType operator_type = 5;

  // 消息状态
  ChatMessageStatus message_status = 6;

  // 回执时间，毫秒
  int64 receipt_time = 7;
}

/**
 * 消息操作 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_MESSAGE_RECALL
 * CHAT_EVENT_TYPE_MESSAGE_DELETE
 */
message ChatMessageOperatePayload {
  // 会话 ID
  string session_no = 1;

  // 消息 ID
  string message_no = 2;

  // 操作类型
  ChatMessageOperateType operate_type = 3;

  // 操作人 ID
  string operator_id = 4;

  // 操作人类型
  ChatSenderType operator_type = 5;

  // 删除范围
  // MESSAGE_DELETE 时使用
  ChatMessageDeleteScope delete_scope = 6;

  // 操作原因
  string reason = 7;

  // 操作时间，毫秒
  int64 operated_at = 8;
}

/**
 * 心跳 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_HEARTBEAT
 */
message ChatHeartbeatPayload {
  // 当前连接 ID，可选
  string connection_id = 1;

  // 用户 ID / 坐席 ID
  string uid = 2;

  // 发送方类型
  ChatSenderType sender_type = 3;

  // 客户端时间戳，毫秒
  int64 client_time = 4;

  // 服务端时间戳，毫秒
  int64 server_time = 5;
}

/**
 * 错误 payload
 *
 * 对应事件：
 * CHAT_EVENT_TYPE_ERROR
 */
message ChatErrorPayload {
  // 会话 ID，可选
  string session_no = 1;

  // 消息 ID，可选
  string message_no = 2;

  // 错误码
  int32 error_code = 3;

  // 错误信息
  string error_message = 4;

  // 错误详情，调试用
  string detail = 5;

  // 是否可以重试
  bool retryable = 6;
}




// 会话分配记录
message ChatAssignment {
  int64 id = 1;                   // 主键ID
  string session_no = 2;          // 会话编号
  int64 merchant_id = 3;          // 客服商户ID
  int64 from_agent_id = 4;        // 原坐席ID
  int64 to_agent_id = 5;          // 目标坐席ID
  ChatAssignType assign_type = 6; // 分配方式
  int64 operator_id = 7;          // 操作人ID
  string reason = 8;              // 分配/转接原因
  int64 create_times = 9;         // 创建时间戳(毫秒)
  int64 update_times = 10;        // 更新时间戳(毫秒)
}

// 客服快捷回复
message ChatQuickReply {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  int64 agent_id = 3;        // 坐席ID,0表示公共快捷回复
  int64 category_id = 4;     // 分类ID
  string title = 5;          // 快捷回复标题
  string content = 6;        // 快捷回复内容
  common.Enable enabled = 7; // 启用状态
  int32 sort = 8;            // 排序,越小越靠前
  string remark = 9;         // 备注
  int64 create_times = 10;   // 创建时间戳(毫秒)
  int64 update_times = 11;   // 更新时间戳(毫秒)
}

// 客服问题分类
message ChatCategory {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  int64 parent_id = 3;       // 父级分类ID
  string category_code = 4;  // 分类编码
  string category_name = 5;  // 分类名称
  int64 group_id = 6;        // 客服分组ID
  common.Enable enabled = 7; // 启用状态
  int32 sort = 8;            // 排序,越小越靠前
  string remark = 9;         // 备注
  int64 create_times = 10;   // 创建时间戳(毫秒)
  int64 update_times = 11;   // 更新时间戳(毫秒)
}

// 客服会话满意度评价
message ChatSatisfaction {
  int64 id = 1;            // 主键ID
  int64 merchant_id = 2;   // 客服商户ID
  string session_no = 3;   // 会话编号
  int64 user_id = 4;       // 用户ID
  int64 agent_id = 5;      // 坐席ID
  int32 score = 6;         // 满意度评分:1-5
  string content = 7;      // 评价内容
  string tags = 8;         // 评价标签,逗号分隔
  int64 create_times = 9;  // 创建时间戳(毫秒)
  int64 update_times = 10; // 更新时间戳(毫秒)
}

// 客服消息已读游标
message ChatReadCursor {
  int64 id = 1;                    // 主键ID
  int64 merchant_id = 2;           // 客服商户ID
  string session_no = 3;           // 会话编号
  ChatSenderType reader_type = 4;  // 读取方类型
  int64 reader_id = 5;             // 读取方ID
  string device_id = 6;            // 设备ID,为空表示默认设备
  string last_read_message_no = 7; // 最后已读消息编号
  int64 last_read_time = 8;        // 最后已读时间戳(毫秒)
  int64 create_times = 9;          // 创建时间戳(毫秒)
  int64 update_times = 10;         // 更新时间戳(毫秒)
}

// 客服分组
message ChatGroup {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  string group_code = 3;     // 分组编码
  string group_name = 4;     // 分组名称
  string description = 5;    // 分组描述
  common.Enable enabled = 6; // 启用状态
  int32 sort = 7;            // 排序,越小越靠前
  string remark = 8;         // 备注
  int64 create_times = 9;    // 创建时间戳(毫秒)
  int64 update_times = 10;   // 更新时间戳(毫秒)
}

// 客服工单/离线留言
message ChatWorkOrder {
  int64 id = 1;                      // 主键ID
  int64 merchant_id = 2;             // 客服商户ID
  string work_order_no = 3;          // 工单编号
  string session_no = 4;             // 关联会话编号
  int64 user_id = 5;                 // 用户ID
  int64 agent_id = 6;                // 坐席ID
  int64 group_id = 7;                // 客服分组ID
  string title = 8;                  // 工单标题
  string content = 9;                // 工单内容/离线留言
  string contact_name = 10;          // 联系人
  string contact_mobile = 11;        // 联系电话
  string contact_email = 12;         // 联系邮箱
  ChatSessionPriority priority = 13; // 优先级
  int32 status = 14;                 // 状态:1待处理 2处理中 3已完成 4已关闭
  int64 handler_id = 15;             // 处理人ID
  string handle_result = 16;         // 处理结果
