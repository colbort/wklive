syntax = "proto3";

package chat;

import "google/protobuf/struct.proto";
import "proto/common/common.proto";
import "proto/chat/enum.proto";

option go_package = "wklive/proto/chat;chat";

// 客服用户/商户账号
message ChatUser {
  int64 id = 1;               // 主键ID
  int64 merchant_id = 2;      // 客服商户ID
  ChatUserType user_type = 3; // 用户类型
  common.YesNo is_owner = 4;  // 是否商户主账号
  string username = 5;        // 登录账号
  string nickname = 6;        // 昵称
  string avatar_url = 7;      // 头像URL
  string mobile = 8;          // 手机号
  string email = 9;           // 邮箱
  common.Enable enabled = 10; // 启用状态
  int64 last_login_time = 11; // 最后登录时间戳(毫秒)
  string remark = 12;         // 备注
  int64 create_times = 13;    // 创建时间戳(毫秒)
  int64 update_times = 14;    // 更新时间戳(毫秒)
  string password = 15;       // bcrypt密码,仅内部使用
  string last_login_ip = 16;  // 最后登录IP
}

// 客服商户接入信息
message ChatMerchant {
  int64 merchant_id = 1;     // 客服商户ID
  string api_key = 2;        // 对接客服API Key
  common.Enable enabled = 3; // 启用状态
  int64 expire_time = 4;     // 到期时间戳(毫秒)
  int64 create_times = 5;    // 创建时间戳(毫秒)
  int64 update_times = 6;    // 更新时间戳(毫秒)
}

// 客服坐席
message ChatAgent {
  int64 id = 1;                    // 主键ID
  int64 merchant_id = 2;           // 客服商户ID
  int64 chat_user_id = 3;          // 客服用户ID
  string agent_no = 4;             // 坐席编号
  string welcome_message = 5;      // 欢迎语
  ChatAgentStatus status = 6;      // 在线状态
  int32 max_session_count = 7;     // 最大同时接待数
  int32 current_session_count = 8; // 当前接待数
  int64 last_active_time = 9;      // 最后活跃时间戳(毫秒)
  string remark = 10;              // 备注
  int64 create_times = 11;         // 创建时间戳(毫秒)
  int64 update_times = 12;         // 更新时间戳(毫秒)
  int64 group_id = 13;             // 客服分组ID
  common.YesNo auto_online = 14;    // 登录是否自动上线
}

// 客服会话
message ChatSession {
  int64 id = 1;                         // 主键ID
  string session_no = 2;                // 会话编号
  int64 merchant_id = 3;                // 客服商户ID
  int64 user_id = 4;                    // 用户ID
  ChatSessionSource source = 5;         // 来源
  ChatSessionStatus status = 6;         // 状态
  ChatSessionPriority priority = 7;     // 优先级
  int64 agent_id = 8;                   // 当前坐席ID
  string title = 9;                     // 会话标题
  string category = 10;                 // 问题分类
  string last_message = 11;             // 最后一条消息摘要
  ChatSenderType last_sender_type = 12; // 最后一条消息发送方
  int64 last_message_time = 13;         // 最后一条消息时间戳(毫秒)
  int32 user_unread_count = 14;         // 用户未读数
  int32 agent_unread_count = 15;        // 坐席未读数
  int64 close_time = 16;                // 结束时间戳(毫秒)
  string close_reason = 17;             // 结束原因
  google.protobuf.Struct ext_json = 18; // 扩展信息
  int64 create_times = 19;              // 创建时间戳(毫秒)
  int64 update_times = 20;              // 更新时间戳(毫秒)
  int64 group_id = 21;                  // 目标客服分组ID
  string last_message_no = 22;          // 最后一条消息编号
}

// 客服消息
message ChatMessageSender {
  int64 id = 1;            // 发送方ID
  ChatSenderType type = 2; // 发送方类型
  string nickname = 3;     // 昵称
  string avatar_url = 4;   // 头像URL
}

message ChatMessage {
  int64 id = 1;                        // 主键ID
  string message_no = 2;               // 消息编号
  string session_no = 3;               // 会话编号
  int64 merchant_id = 4;               // 客服商户ID
  int64 user_id = 5;                   // 用户ID
  int64 agent_id = 6;                  // 坐席ID
  ChatSenderType sender_type = 7;      // 发送方类型
  ChatMessageType message_type = 8;    // 消息类型
  string content = 9;                  // 文本内容
  string media_url = 10;               // 媒体/文件URL
  string media_name = 11;              // 文件名
  string media_mime = 12;              // MIME类型
  int64 media_size = 13;               // 文件大小(bytes)
  ChatMessageStatus status = 14;       // 消息状态
  google.protobuf.Struct payload = 15; // 卡片/扩展载荷
  int64 read_time = 16;                // 已读时间戳(毫秒)
  int64 create_times = 17;             // 创建时间戳(毫秒)
  int64 update_times = 18;             // 更新时间戳(毫秒)
  ChatMessageSender sender = 19;       // 发送方信息快照
}

// 客服排队信息
message ChatQueueInfo {
  int64 merchant_id = 1;           // 客服商户ID
  string session_no = 2;           // 会话编号
  int64 user_id = 3;               // 用户ID
  int64 group_id = 4;              // 客服分组ID
  int32 position = 5;              // 当前会话排队位置,1表示下一位
  int32 waiting_count = 6;         // 当前等待总数
  int64 estimate_wait_seconds = 7; // 预计等待秒数
  string message = 8;              // 给用户展示的排队提示
  int64 update_times = 9;          // 更新时间戳(毫秒)
}

// 客服会话事件
message ChatSessionEvent {
  string session_no = 1;           // 会话编号
  int64 merchant_id = 2;           // 客服商户ID
  int64 user_id = 3;               // 用户ID
  int64 agent_id = 4;              // 坐席ID
  int64 operator_id = 5;           // 操作人ID
  ChatSessionStatus status = 6;    // 事件后的会话状态
  ChatAssignType assign_type = 7;  // 分配方式
  string reason = 8;               // 事件原因
  string message = 9;              // 给前端展示的系统提示
  ChatSession session = 10;        // 会话快照
  ChatQueueInfo queue = 11;        // 排队信息
  int64 created_at = 12;           // 事件创建时间戳(毫秒)
}

// 客服消息事件,用于消息总线/WebSocket推送
message ChatMessageEvent {
  string type = 1;                  // 事件类型,例如 chat.message
  ChatMessage data = 2;             // 消息内容
  int64 created_at = 3;             // 事件创建时间戳(毫秒)
  ChatSession session = 4;          // 会话快照
  ChatSessionEvent session_event = 5; // 会话事件
  ChatQueueInfo queue = 6;          // 排队信息
  common.RespBase base = 7;         // 业务响应
  ChatAgent agent = 8;              // 坐席快照
}

// WebSocket连接成功消息
message ChatWsConnected {
  string message = 1;     // 提示文案
  int64 merchant_id = 2;  // 客服商户ID
  int64 user_id = 3;      // 用户ID
  string username = 4;    // 用户名
  string session_no = 5;  // 会话编号
  bool temporary = 6;     // 是否临时游客会话
  ChatSession session = 7; // 会话快照
  ChatQueueInfo queue = 8; // 排队信息
}

// 用户侧WebSocket发送消息
message ChatWsUserMessageReq {
  string session_no = 1;            // 会话编号,为空时使用当前连接会话
  ChatMessageType message_type = 2; // 消息类型
  string content = 3;               // 文本内容
  string media_url = 4;             // 媒体/文件URL
  string media_name = 5;            // 文件名
  string media_mime = 6;            // MIME类型
  int64 media_size = 7;             // 文件大小(bytes)
  string sender_nickname = 8;       // 用户昵称快照
  string sender_avatar_url = 9;     // 用户头像快照
  string client_msg_no = 10;        // 客户端消息编号,用于幂等
}

// 坐席侧WebSocket发送消息
message ChatWsAgentMessageReq {
  int64 merchant_id = 1;            // 客服商户ID
  int64 agent_id = 2;               // 坐席ID
  int64 user_id = 3;                // 用户ID
  string session_no = 4;            // 会话编号
  ChatMessageType message_type = 5; // 消息类型
  string content = 6;               // 文本内容
  string media_url = 7;             // 媒体/文件URL
  string media_name = 8;            // 文件名
  string media_mime = 9;            // MIME类型
  int64 media_size = 10;            // 文件大小(bytes)
  string sender_nickname = 11;      // 坐席昵称快照
  string sender_avatar_url = 12;    // 坐席头像快照
  string client_msg_no = 13;        // 客户端消息编号,用于幂等
}

// 坐席侧WebSocket接待会话
message ChatWsAcceptSessionReq {
  int64 merchant_id = 1; // 客服商户ID
  int64 agent_id = 2;    // 坐席ID
  int64 user_id = 3;     // 用户ID
  string session_no = 4; // 会话编号
  string reason = 5;     // 接待原因
}

// WebSocket关闭会话
message ChatWsCloseSessionReq {
  int64 merchant_id = 1;  // 客服商户ID
  int64 operator_id = 2;  // 操作人ID
  int64 user_id = 3;      // 用户ID
  int64 agent_id = 4;     // 坐席ID
  string session_no = 5;  // 会话编号
  string close_reason = 6; // 结束原因
}

// WebSocket通用消息,用于规范前后端JSON结构
message ChatWsMessage {
  string type = 1;                         // 事件类型
  common.RespBase base = 2;                // 响应状态
  ChatWsConnected connected = 3;           // 连接成功数据
  ChatWsUserMessageReq user_message = 4;   // 用户发送消息请求
  ChatWsAgentMessageReq agent_message = 5; // 坐席发送消息请求
  ChatWsAcceptSessionReq accept_session = 6; // 接待请求
  ChatWsCloseSessionReq close_session = 7; // 关闭会话请求
  ChatMessage message = 8;                 // 消息数据
  ChatSession session = 9;                 // 会话数据
  ChatSessionEvent session_event = 10;     // 会话事件
  ChatQueueInfo queue = 11;                // 排队信息
  int64 created_at = 12;                   // 事件创建时间戳(毫秒)
}

// 会话分配记录
message ChatAssignment {
  int64 id = 1;                   // 主键ID
  string session_no = 2;          // 会话编号
  int64 merchant_id = 3;          // 客服商户ID
  int64 from_agent_id = 4;        // 原坐席ID
  int64 to_agent_id = 5;          // 目标坐席ID
  ChatAssignType assign_type = 6; // 分配方式
  int64 operator_id = 7;          // 操作人ID
  string reason = 8;              // 分配/转接原因
  int64 create_times = 9;         // 创建时间戳(毫秒)
  int64 update_times = 10;        // 更新时间戳(毫秒)
}

// 客服快捷回复
message ChatQuickReply {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  int64 agent_id = 3;        // 坐席ID,0表示公共快捷回复
  int64 category_id = 4;     // 分类ID
  string title = 5;          // 快捷回复标题
  string content = 6;        // 快捷回复内容
  common.Enable enabled = 7; // 启用状态
  int32 sort = 8;            // 排序,越小越靠前
  string remark = 9;         // 备注
  int64 create_times = 10;   // 创建时间戳(毫秒)
  int64 update_times = 11;   // 更新时间戳(毫秒)
}

// 客服问题分类
message ChatCategory {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  int64 parent_id = 3;       // 父级分类ID
  string category_code = 4;  // 分类编码
  string category_name = 5;  // 分类名称
  int64 group_id = 6;        // 客服分组ID
  common.Enable enabled = 7; // 启用状态
  int32 sort = 8;            // 排序,越小越靠前
  string remark = 9;         // 备注
  int64 create_times = 10;   // 创建时间戳(毫秒)
  int64 update_times = 11;   // 更新时间戳(毫秒)
}

// 客服会话满意度评价
message ChatSatisfaction {
  int64 id = 1;            // 主键ID
  int64 merchant_id = 2;   // 客服商户ID
  string session_no = 3;   // 会话编号
  int64 user_id = 4;       // 用户ID
  int64 agent_id = 5;      // 坐席ID
  int32 score = 6;         // 满意度评分:1-5
  string content = 7;      // 评价内容
  string tags = 8;         // 评价标签,逗号分隔
  int64 create_times = 9;  // 创建时间戳(毫秒)
  int64 update_times = 10; // 更新时间戳(毫秒)
}

// 客服消息已读游标
message ChatReadCursor {
  int64 id = 1;                    // 主键ID
  int64 merchant_id = 2;           // 客服商户ID
  string session_no = 3;           // 会话编号
  ChatSenderType reader_type = 4;  // 读取方类型
  int64 reader_id = 5;             // 读取方ID
  string device_id = 6;            // 设备ID,为空表示默认设备
  string last_read_message_no = 7; // 最后已读消息编号
  int64 last_read_time = 8;        // 最后已读时间戳(毫秒)
  int64 create_times = 9;          // 创建时间戳(毫秒)
  int64 update_times = 10;         // 更新时间戳(毫秒)
}

// 客服分组
message ChatGroup {
  int64 id = 1;              // 主键ID
  int64 merchant_id = 2;     // 客服商户ID
  string group_code = 3;     // 分组编码
  string group_name = 4;     // 分组名称
  string description = 5;    // 分组描述
  common.Enable enabled = 6; // 启用状态
  int32 sort = 7;            // 排序,越小越靠前
  string remark = 8;         // 备注
  int64 create_times = 9;    // 创建时间戳(毫秒)
  int64 update_times = 10;   // 更新时间戳(毫秒)
}

// 客服工单/离线留言
message ChatWorkOrder {
  int64 id = 1;                      // 主键ID
  int64 merchant_id = 2;             // 客服商户ID
  string work_order_no = 3;          // 工单编号
  string session_no = 4;             // 关联会话编号
  int64 user_id = 5;                 // 用户ID
  int64 agent_id = 6;                // 坐席ID
  int64 group_id = 7;                // 客服分组ID
  string title = 8;                  // 工单标题
  string content = 9;                // 工单内容/离线留言
  string contact_name = 10;          // 联系人
  string contact_mobile = 11;        // 联系电话
  string contact_email = 12;         // 联系邮箱
  ChatSessionPriority priority = 13; // 优先级
  int32 status = 14;                 // 状态:1待处理 2处理中 3已完成 4已关闭
  int64 handler_id = 15;             // 处理人ID
  string handle_result = 16;         // 处理结果
  int64 finish_time = 17;            // 完成时间戳(毫秒)
  string remark = 18;                // 备注
  int64 create_times = 19;           // 创建时间戳(毫秒)
  int64 update_times = 20;           // 更新时间戳(毫秒)
}
