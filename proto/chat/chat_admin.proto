syntax = "proto3";

package chat;

import "proto/common/common.proto";
import "proto/chat/enum.proto";
import "proto/chat/model.proto";

option go_package = "wklive/proto/chat;chat";

// 后台客服服务
service ChatAdmin {
  // 登录
  rpc Login(ChatAdminLoginReq) returns (ChatAdminLoginResp);

  // 退出登录
  rpc Logout(ChatAdminLogoutReq) returns (AdminCommonResp);

  // 当前登录用户资料
  rpc Profile(ChatAdminProfileReq) returns (ChatAdminProfileResp);

  // 更新当前登录用户资料
  rpc UpdateProfile(UpdateChatAdminProfileReq) returns (ChatAdminProfileResp);

  // 创建客服分组
  rpc CreateChatGroup(CreateChatGroupReq) returns (AdminChatGroupResp);

  // 更新客服分组
  rpc UpdateChatGroup(UpdateChatGroupReq) returns (AdminChatGroupResp);

  // 查询客服分组详情
  rpc GetChatGroup(GetChatGroupReq) returns (AdminChatGroupResp);

  // 分页查询客服分组
  rpc PageChatGroups(PageChatGroupsReq) returns (PageChatGroupsResp);

  // 删除客服分组
  rpc DeleteChatGroup(DeleteChatGroupReq) returns (AdminCommonResp);

  // 创建坐席
  rpc CreateChatAgent(CreateChatAgentReq) returns (AdminChatAgentResp);

  // 更新坐席
  rpc UpdateChatAgent(UpdateChatAgentReq) returns (AdminChatAgentResp);

  // 更新坐席在线状态
  rpc UpdateChatAgentStatus(UpdateChatAgentStatusReq)
      returns (AdminChatAgentResp);

  // 查询坐席详情
  rpc GetChatAgent(GetChatAgentReq) returns (AdminChatAgentResp);

  // 分页查询坐席
  rpc PageChatAgents(PageChatAgentsReq) returns (PageChatAgentsResp);

  // 分页查询会话
  rpc PageChatSessions(PageChatSessionsReq) returns (PageChatSessionsResp);

  // 查询会话详情
  rpc GetChatSession(GetChatSessionReq) returns (AdminChatSessionResp);

  // 分配会话
  rpc AssignChatSession(AssignChatSessionReq) returns (AdminChatSessionResp);

  // 接待会话
  rpc AcceptChatSession(AcceptChatSessionReq) returns (AdminChatSessionResp);

  // 发送客服消息
  rpc SendAgentMessage(SendAgentMessageReq) returns (AdminChatMessageResp);

  // 查询会话消息
  rpc PageChatMessages(PageChatMessagesReq) returns (PageChatMessagesResp);

  // 标记客服侧已读
  rpc MarkAgentMessagesRead(MarkAgentMessagesReadReq)
      returns (AdminMarkMessagesReadResp);

  // 关闭会话
  rpc CloseChatSession(CloseChatSessionReq) returns (AdminChatSessionResp);

  // 创建快捷回复
  rpc CreateChatQuickReply(CreateChatQuickReplyReq)
      returns (AdminChatQuickReplyResp);

  // 更新快捷回复
  rpc UpdateChatQuickReply(UpdateChatQuickReplyReq)
      returns (AdminChatQuickReplyResp);

  // 查询快捷回复详情
  rpc GetChatQuickReply(GetChatQuickReplyReq) returns (AdminChatQuickReplyResp);

  // 分页查询快捷回复
  rpc PageChatQuickReplies(PageChatQuickRepliesReq)
      returns (PageChatQuickRepliesResp);

  // 查询启用快捷回复
  rpc ListEnabledChatQuickReplies(ListEnabledChatQuickRepliesReq)
      returns (ListChatQuickRepliesResp);

  // 删除快捷回复
  rpc DeleteChatQuickReply(DeleteChatQuickReplyReq) returns (AdminCommonResp);

  // 创建问题分类
  rpc CreateChatCategory(CreateChatCategoryReq) returns (AdminChatCategoryResp);

  // 更新问题分类
  rpc UpdateChatCategory(UpdateChatCategoryReq) returns (AdminChatCategoryResp);

  // 查询问题分类详情
  rpc GetChatCategory(GetChatCategoryReq) returns (AdminChatCategoryResp);

  // 分页查询问题分类
  rpc PageChatCategories(PageChatCategoriesReq)
      returns (PageChatCategoriesResp);

  // 查询启用问题分类
  rpc ListEnabledChatCategories(ListEnabledChatCategoriesReq)
      returns (ListChatCategoriesResp);

  // 删除问题分类
  rpc DeleteChatCategory(DeleteChatCategoryReq) returns (AdminCommonResp);

  // 创建工单/离线留言
  rpc CreateChatWorkOrder(CreateChatWorkOrderReq)
      returns (AdminChatWorkOrderResp);

  // 更新工单
  rpc UpdateChatWorkOrder(UpdateChatWorkOrderReq)
      returns (AdminChatWorkOrderResp);

  // 处理工单
  rpc HandleChatWorkOrder(HandleChatWorkOrderReq)
      returns (AdminChatWorkOrderResp);

  // 查询工单详情
  rpc GetChatWorkOrder(GetChatWorkOrderReq) returns (AdminChatWorkOrderResp);

  // 分页查询工单
  rpc PageChatWorkOrders(PageChatWorkOrdersReq)
      returns (PageChatWorkOrdersResp);

  // 删除工单
  rpc DeleteChatWorkOrder(DeleteChatWorkOrderReq) returns (AdminCommonResp);
}

message AdminCommonResp { common.RespBase base = 1; }

message ChatAdminLoginReq {
  string username = 1;    // 登录账号
  string password = 2;    // 登录密码
  string google_code = 3; // Google验证码
}

message ChatAdminLoginData {
  common.TokenInfo token = 1;
  ChatUser user = 2;
  ChatAgent agent = 3;
}

message ChatAdminLoginResp {
  common.RespBase base = 1;
  ChatAdminLoginData data = 2;
}

message ChatAdminLogoutReq {}

message ChatAdminProfileReq {}

message UpdateChatAdminProfileReq {
  string old_password = 1; // 原密码
  string new_password = 2; // 新密码
  string avatar_url = 3;   // 头像URL
}

message ChatAdminProfileResp {
  common.RespBase base = 1;
  ChatUser user = 2;
  ChatAgent agent = 3;
}

message CreateChatGroupReq {
  string group_code = 1;     // 分组编码
  string group_name = 2;     // 分组名称
  string description = 3;    // 分组描述
  common.Enable enabled = 4; // 启用状态
  int32 sort = 5;            // 排序
  string remark = 6;         // 备注
}

message UpdateChatGroupReq {
  int64 id = 1;              // 主键ID
  string group_name = 2;     // 分组名称
  string description = 3;    // 分组描述
  common.Enable enabled = 4; // 启用状态
  int32 sort = 5;            // 排序
  string remark = 6;         // 备注
}

message GetChatGroupReq {
  int64 id = 1; // 主键ID
}

message PageChatGroupsReq {
  common.Enable enabled = 1; // 启用状态,0表示全部
  string keyword = 2;        // 关键词
  common.PageReq page = 3;   // 分页
}

message DeleteChatGroupReq {
  int64 id = 1; // 主键ID
}

message CreateChatAgentReq {
  int32 max_session_count = 1;  // 最大同时接待数
  string remark = 2;            // 备注
  int64 group_id = 3;           // 客服分组ID
  string welcome_message = 4;   // 欢迎语
  string username = 5;          // 登录账号
  string password = 6;          // 登录密码
  string nickname = 7;          // 昵称
  string mobile = 8;            // 手机号
  string email = 9;             // 邮箱
  common.Enable enabled = 10;   // 启用状态
  common.YesNo auto_online = 11; // 登录是否自动上线
  string avatar_url = 12;       // 头像URL
}

message UpdateChatAgentReq {
  int64 id = 1;                 // 主键ID
  int32 max_session_count = 2;  // 最大同时接待数
  string remark = 3;            // 备注
  int64 group_id = 4;           // 客服分组ID
  string welcome_message = 5;   // 欢迎语
  common.YesNo auto_online = 6; // 登录是否自动上线
  string nickname = 7;          // 昵称
  string avatar_url = 8;        // 头像URL
  string mobile = 9;            // 手机号
  string email = 10;            // 邮箱
  common.Enable enabled = 11;   // 启用状态
  string password = 12;         // 新密码,为空不修改
}

message UpdateChatAgentStatusReq {
  int64 id = 1;                // 坐席ID；0表示当前登录坐席
  ChatAgentStatus status = 2;  // 在线状态
  string reason = 3;           // 状态变化原因
}

message GetChatAgentReq {
  int64 id = 1; // 主键ID
}

message PageChatAgentsReq {
  int64 chat_user_id = 1;     // 客服用户ID,0表示全部
  ChatAgentStatus status = 2; // 在线状态,0表示全部
  int64 group_id = 3;         // 客服分组ID,0表示全部
  common.PageReq page = 4;    // 分页
}

message PageChatSessionsReq {
  int64 user_id = 1;                // 用户ID,0表示全部
  int64 agent_id = 2;               // 坐席ID,0表示全部
  ChatSessionStatus status = 3;     // 状态,0表示全部
  ChatSessionPriority priority = 4; // 优先级,0表示全部
  string category = 5;              // 问题分类,空表示全部
  common.TimeRange time_range = 6;  // 创建时间范围
  common.PageReq page = 7;          // 分页
  int64 group_id = 8;               // 客服分组ID,0表示全部
  string keyword = 9;               // 关键词:会话号/标题/最后消息
}

message GetChatSessionReq {
  string session_no = 1; // 会话编号
}

message AssignChatSessionReq {
  string session_no = 1;          // 会话编号
  int64 to_agent_id = 2;          // 目标坐席ID
  ChatAssignType assign_type = 3; // 分配方式:手动/转接
  string reason = 4;              // 分配/转接原因
}

message AcceptChatSessionReq {
  string session_no = 1; // 会话编号
  string reason = 2;     // 接待原因
}

message SendAgentMessageReq {
  string session_no = 1;            // 会话编号
  string client_message_id = 2;     // 客户端消息ID,用于幂等/回执
  ChatMessageType message_type = 3; // 消息类型
  string content = 4;               // 文本内容
  string url = 5;                   // 资源URL
  string file_name = 6;             // 文件名
  int64 file_size = 7;              // 文件大小(byte)
  string mime_type = 8;             // MIME类型
  int32 width = 9;                  // 图片/视频宽度
  int32 height = 10;                // 图片/视频高度
  int32 duration = 11;              // 音频/视频时长(秒)
  string extra = 12;                // 扩展JSON
}

message PageChatMessagesReq {
  string session_no = 1;          // 会话编号
  ChatSenderType sender_type = 2; // 发送方类型,0表示全部
  common.PageReq page = 3;        // 分页
}

message MarkAgentMessagesReadReq {
  string session_no = 1;           // 会话编号
  string last_read_message_no = 2; // 最后已读消息编号,空表示全部
}

message CloseChatSessionReq {
  string session_no = 1;                         // 会话编号
  ChatSessionCloseReason close_reason_type = 2;  // 结束原因类型
  string close_reason = 3;                       // 结束原因描述
}

message CreateChatQuickReplyReq {
  int64 agent_id = 1;        // 坐席ID,0表示公共快捷回复
  int64 category_id = 2;     // 分类ID
  string title = 3;          // 标题
  string content = 4;        // 内容
  common.Enable enabled = 5; // 启用状态
  int32 sort = 6;            // 排序
  string remark = 7;         // 备注
}

message UpdateChatQuickReplyReq {
  int64 id = 1;              // 主键ID
  int64 agent_id = 2;        // 坐席ID,0表示公共快捷回复
  int64 category_id = 3;     // 分类ID
  string title = 4;          // 标题
  string content = 5;        // 内容
  common.Enable enabled = 6; // 启用状态
  int32 sort = 7;            // 排序
  string remark = 8;         // 备注
}

message GetChatQuickReplyReq {
  int64 id = 1; // 主键ID
}

message PageChatQuickRepliesReq {
  int64 agent_id = 1;        // 坐席ID,0表示全部
  int64 category_id = 2;     // 分类ID,0表示全部
  common.Enable enabled = 3; // 启用状态,0表示全部
  string keyword = 4;        // 关键词
  common.PageReq page = 5;   // 分页
}

message ListEnabledChatQuickRepliesReq {
  int64 agent_id = 1;    // 坐席ID,0表示公共
  int64 category_id = 2; // 分类ID,0表示全部
}

message DeleteChatQuickReplyReq {
  int64 id = 1; // 主键ID
}

message CreateChatCategoryReq {
  int64 parent_id = 1;       // 父级分类ID
  string category_code = 2;  // 分类编码
  string category_name = 3;  // 分类名称
  int64 group_id = 4;        // 客服分组ID
  common.Enable enabled = 5; // 启用状态
  int32 sort = 6;            // 排序
  string remark = 7;         // 备注
}

message UpdateChatCategoryReq {
  int64 id = 1;              // 主键ID
  int64 parent_id = 2;       // 父级分类ID
  string category_name = 3;  // 分类名称
  int64 group_id = 4;        // 客服分组ID
  common.Enable enabled = 5; // 启用状态
  int32 sort = 6;            // 排序
  string remark = 7;         // 备注
}

message GetChatCategoryReq {
  int64 id = 1; // 主键ID
}

message PageChatCategoriesReq {
  int64 parent_id = 1;       // 父级分类ID,0表示全部
  string category_code = 2;  // 分类编码
  string category_name = 3;  // 分类名称
  common.Enable enabled = 4; // 启用状态,0表示全部
  string keyword = 5;        // 关键词
  common.PageReq page = 6;   // 分页
}

message ListEnabledChatCategoriesReq {
  int64 group_id = 1;  // 客服分组ID,0表示全部
  int64 parent_id = 2; // 父级分类ID,0表示全部
}

message DeleteChatCategoryReq {
  int64 id = 1; // 主键ID
}

message CreateChatWorkOrderReq {
  string session_no = 1;             // 关联会话编号
  int64 user_id = 2;                 // 用户ID
  int64 agent_id = 3;                // 坐席ID
  int64 group_id = 4;                // 客服分组ID
  string title = 5;                  // 工单标题
  string content = 6;                // 工单内容/离线留言
  string contact_name = 7;           // 联系人
  string contact_mobile = 8;         // 联系电话
  string contact_email = 9;          // 联系邮箱
  ChatSessionPriority priority = 10; // 优先级
  string remark = 11;                // 备注
}

message UpdateChatWorkOrderReq {
  int64 id = 1;                     // 主键ID
  int64 agent_id = 2;               // 坐席ID
  int64 group_id = 3;               // 客服分组ID
  string title = 4;                 // 工单标题
  string content = 5;               // 工单内容/离线留言
  string contact_name = 6;          // 联系人
  string contact_mobile = 7;        // 联系电话
  string contact_email = 8;         // 联系邮箱
  ChatSessionPriority priority = 9; // 优先级
  int32 status = 10;                // 状态
  string remark = 11;               // 备注
}

message HandleChatWorkOrderReq {
  int64 id = 1;             // 主键ID
  int64 handler_id = 2;     // 处理人ID
  int32 status = 3;         // 状态:2处理中 3已完成 4已关闭
  string handle_result = 4; // 处理结果
  string remark = 5;        // 备注
}

message GetChatWorkOrderReq {
  int64 id = 1;             // 主键ID
  string work_order_no = 2; // 工单编号
}

message PageChatWorkOrdersReq {
  string session_no = 1;            // 会话编号
  int64 user_id = 2;                // 用户ID,0表示全部
  int64 agent_id = 3;               // 坐席ID,0表示全部
  int64 group_id = 4;               // 分组ID,0表示全部
  ChatSessionPriority priority = 5; // 优先级,0表示全部
  int32 status = 6;                 // 状态,0表示全部
  int64 handler_id = 7;             // 处理人ID,0表示全部
  string keyword = 8;               // 关键词
  common.TimeRange time_range = 9;  // 创建时间范围
  common.PageReq page = 10;         // 分页
}

message DeleteChatWorkOrderReq {
  int64 id = 1; // 主键ID
}

message PageChatAgentsResp {
  common.RespBase base = 1;
  repeated ChatAgent data = 2;
}

message PageChatGroupsResp {
  common.RespBase base = 1;
  repeated ChatGroup data = 2;
}

message PageChatSessionsResp {
  common.RespBase base = 1;
  repeated ChatSession data = 2;
}

message PageChatMessagesResp {
  common.RespBase base = 1;
  repeated ChatMessage data = 2;
}

message PageChatQuickRepliesResp {
  common.RespBase base = 1;
  repeated ChatQuickReply data = 2;
}

message ListChatQuickRepliesResp {
  common.RespBase base = 1;
  repeated ChatQuickReply data = 2;
}

message PageChatCategoriesResp {
  common.RespBase base = 1;
  repeated ChatCategory data = 2;
}

message ListChatCategoriesResp {
  common.RespBase base = 1;
  repeated ChatCategory data = 2;
}

message PageChatWorkOrdersResp {
  common.RespBase base = 1;
  repeated ChatWorkOrder data = 2;
}

message AdminChatAgentResp {
  common.RespBase base = 1;
  ChatAgent data = 2;
}

message AdminChatGroupResp {
  common.RespBase base = 1;
  ChatGroup data = 2;
}

message AdminChatSessionResp {
  common.RespBase base = 1;
  ChatSession data = 2;
}

message AdminChatMessageResp {
  common.RespBase base = 1;
  ChatMessage data = 2;
}

message AdminMarkMessagesReadResp { common.RespBase base = 1; }

message AdminChatQuickReplyResp {
  common.RespBase base = 1;
  ChatQuickReply data = 2;
}

message AdminChatCategoryResp {
  common.RespBase base = 1;
  ChatCategory data = 2;
}

message AdminChatWorkOrderResp {
  common.RespBase base = 1;
  ChatWorkOrder data = 2;
}
