syntax = "proto3";

package common;

option go_package = "wklive/proto/common;common";

message Empty {}

message RespBase {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  bool has_next = 4;
  bool has_prev = 5;
  int64 next_cursor = 6;
  int64 prev_cursor = 7;
}

message PageReq {
  int64 cursor = 1;
  int64 limit = 2;
}

message TokenInfo {
  string access_token = 1;
  string refresh_token = 2;
  int64 expire_time = 3;
}

message TimeRange {
  int64 start_time = 1;
  int64 end_time = 2;
}

enum ChainCode {
  CHAIN_CODE_UNKNOWN = 0; // 未指定
  // 主网
  CHAIN_CODE_BTC = 1;       // Bitcoin
  CHAIN_CODE_ETH = 2;       // Ethereum mainnet
  CHAIN_CODE_TRX = 3;       // Tron
  CHAIN_CODE_BSC = 4;       // BNB Smart Chain
  CHAIN_CODE_SOL = 5;       // Solana
  CHAIN_CODE_POLYGON = 6;   // Polygon
  // 代币标准/常用网络展示名
  CHAIN_CODE_TRC20 = 20;    // USDT on Tron
  CHAIN_CODE_ERC20 = 21;    // Token on Ethereum
  CHAIN_CODE_BEP20 = 22;    // Token on BSC
}