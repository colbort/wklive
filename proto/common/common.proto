syntax = "proto3";

package common;

option go_package = "wklive/proto/common;common";

message Empty {}

message RespBase {
  int32 code = 1;
  string msg = 2;
  int64 total = 3;
  bool has_next = 4;
  bool has_prev = 5;
  int64 next_cursor = 6;
  int64 prev_cursor = 7;
}

message PageReq {
  int64 cursor = 1;
  int64 limit = 2;
}

message TokenInfo {
  string access_token = 1;
  string refresh_token = 2;
  int64 expire_time = 3;
}

message TimeRange {
  int64 start_time = 1;
  int64 end_time = 2;
}