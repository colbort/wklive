syntax = "proto3";

package tenant;

import "proto/common/common.proto";
import "proto/tenant/enum.proto";

option go_package = "wklive/proto/tenant;tenant";

message Empty {}

message RespBase { common.RespBase base = 1; }

//////////////////////
// Auth / 登录
//////////////////////
message TenantLoginReq {
  string username = 1;
  string password = 2;
  string google_code = 3; // optional
  string ip = 4;
  string ua = 5;
}

message TenantLoginResp {
  common.RespBase base = 1;
  string token = 3;
  int64 exp = 4;
  int64 uid = 5;
  string nickname = 6;
  repeated int64 role_ids = 7;
  int64 google2fa_enabled = 8;
  int64 perms_ver = 9;
}

message ProfileReq { int64 uid = 1; }

message ProfileUser {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
}

message TenantMenuNode {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  tenant.MenuType menu_type = 4;
  string path = 5;
  string component = 6;
  string icon = 7;
  int64 sort = 8;
  tenant.VisibleStatus visible = 9;
  tenant.CommonStatus status = 10;
  string perms = 11;
  repeated TenantMenuNode children = 12;
}

message ProfileResp {
  ProfileUser user = 1;
  repeated TenantMenuNode menus = 2;
  repeated string perms = 3;
  repeated int64 role_ids = 4;
}

message UpdateProfileReq {
  int64 id = 1;
  optional string nickname = 2;
  optional string avatar = 3;
  optional string password = 4;
}

//////////////////////
// Menu / Perms
//////////////////////
message TenantMenuItem {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  tenant.MenuType menu_type = 4;
  tenant.RequestMethod method = 5;
  string path = 6;
  string component = 7;
  string icon = 8;
  int64 sort = 9;
  tenant.VisibleStatus visible = 10;
  tenant.CommonStatus status = 11;
  string perms = 12; // 按钮必须有，例如 sys:user:add
}

message TenantMenuTreeResp {
  common.RespBase base = 1;
  repeated TenantMenuItem data = 2;
}

//////////////////////
// Google 2FA
//////////////////////
message Google2FAInitReq { int64 user_id = 1; }
message Google2FAInitResp {
  common.RespBase base = 1;
  string secret = 3;
  string otpauth_url = 4;
}

message Google2FABindReq {
  int64 user_id = 1;
  string secret = 2;
  string code = 3;
}

message Google2FAEnableReq {
  int64 user_id = 1;
  string code = 2;
}
message Google2FADisableReq {
  int64 user_id = 1;
  string code = 2;
} // 可选强校验
message Google2FAResetReq { int64 user_id = 1; }

//////////////////////
// RBAC - 租户
//////////////////////
message TenantUserItem {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  tenant.CommonStatus status = 4;
  repeated int64 role_ids = 5;
  int64 create_times = 6;
  int64 google2fa_enabled = 7;
}

message TenantUserListReq {
  common.PageReq page = 1;
  string keyword = 2;
  tenant.CommonStatus status = 3;
}
message TenantUserListResp {
  common.RespBase base = 1;
  repeated TenantUserItem data = 4;
}

message TenantUserDetailReq { int64 id = 1; }
message TenantUserDetailResp {
  common.RespBase base = 1;
  TenantUserItem data = 3;
}

message TenantUserCreateReq {
  string username = 1;
  string password = 2;
  string nickname = 3;
  tenant.CommonStatus status = 4;
  repeated int64 role_ids = 5;
}
message TenantUserUpdateReq {
  int64 id = 1;
  string nickname = 2;
  tenant.CommonStatus status = 3;
  repeated int64 role_ids = 4;
}
message TenantUserDeleteReq { int64 id = 1; }
message ChangeUserStatusReq {
  int64 id = 1;
  tenant.CommonStatus status = 2;
}
message ResetUserPwdReq {
  int64 id = 1;
  string password = 2;
}
message AssignUserRolesReq {
  int64 user_id = 1;
  repeated int64 role_ids = 2;
}

//////////////////////
// RBAC - 角色
//////////////////////
message TenantRoleItem {
  int64 id = 1;
  string name = 2;
  string code = 3;
  tenant.CommonStatus status = 4;
  string remark = 5;
  int64 create_times = 6;
}
message TenantRoleListReq {
  common.PageReq page = 1;
  string keyword = 2;
  tenant.CommonStatus status = 3;
}
message TenantRoleListResp {
  common.RespBase base = 1;
  repeated TenantRoleItem data = 4;
}

message TenantRoleCreateReq {
  string name = 1;
  string code = 2;
  tenant.CommonStatus status = 3;
  string remark = 4;
}
message TenantRoleUpdateReq {
  int64 id = 1;
  string name = 2;
  tenant.CommonStatus status = 3;
  string remark = 4;
}
message TenantRoleDeleteReq { int64 id = 1; }
message TenantRoleGrantReq {
  int64 role_id = 1;
  repeated int64 menu_ids = 2;
}

message TenantRoleGrantDetailReq { int64 role_id = 1; }
message TenantRoleGrantDetailResp {
  common.RespBase base = 1;
  int64 role_id = 3;
  repeated int64 menu_ids = 4;
  repeated string perm_keys = 5;
}

message TenantPermItem {
  string perm_key = 1;
  tenant.RequestMethod method = 2;
  string path = 3;
  string name = 4;
}

message TenantPermListResp {
  common.RespBase base = 1;
  repeated TenantPermItem data = 3;
}

//////////////////////
// RBAC - 菜单
//////////////////////
message TenantMenuCreateReq {
  int64 parent_id = 1;
  string name = 2;
  tenant.MenuType menu_type = 3;
  tenant.RequestMethod method = 4;
  string path = 5;
  string component = 6;
  string icon = 7;
  int64 sort = 8;
  tenant.VisibleStatus visible = 9;
  tenant.CommonStatus status = 10;
  string perms = 12;
}
message TenantMenuUpdateReq {
  int64 id = 1;
  int64 parent_id = 2;
  string name = 3;
  tenant.MenuType menu_type = 4;
  tenant.RequestMethod method = 5;
  string path = 6;
  string component = 7;
  string icon = 8;
  int64 sort = 9;
  tenant.VisibleStatus visible = 10;
  tenant.CommonStatus status = 11;
  string perms = 12;
}
message TenantMenuDeleteReq { int64 id = 1; }

message TenantMenuListReq {
  common.PageReq page = 1;
  string keyword = 2;
  tenant.MenuType menu_type = 3;
  tenant.CommonStatus status = 4;
  tenant.VisibleStatus visible = 5;
}
message TenantMenuListResp {
  common.RespBase base = 1;
  repeated TenantMenuItem data = 4;
}

//////////////////////
// Logs
//////////////////////
message LoginLogItem {
  int64 id = 1;
  int64 user_id = 2;
  string username = 3;
  string ip = 4;
  string ua = 5;
  int64 success = 6;
  string msg = 7;
  int64 login_at = 8;
}
message LoginLogListReq {
  common.PageReq page = 1;
  string username = 2;
  int64 success = 3;
}
message LoginLogListResp {
  common.RespBase base = 1;
  repeated LoginLogItem data = 4;
}

message OpLogItem {
  int64 id = 1;
  int64 user_id = 2;
  string username = 3;
  tenant.RequestMethod method = 4;
  string path = 5;
  string req = 6;
  string resp = 7;
  string ip = 8;
  int64 cost_ms = 9;
  int64 create_times = 10;
  int64 update_times = 11;
}
message OpLogListReq {
  common.PageReq page = 1;
  string username = 2;
  tenant.RequestMethod method = 3;
  string path = 4;
}
message OpLogListResp {
  common.RespBase base = 1;
  repeated OpLogItem data = 4;
}

message TenantConfigCreateReq {
  string config_key = 1;
  string config_value = 2;
  string remark = 3;
}

message TenantConfigUpdateReq {
  int64 id = 1;
  string config_key = 2;
  string config_value = 3;
  string remark = 4;
}

message TenantConfigDeleteReq { int64 id = 1; }

message TenantConfigItem {
  int64 id = 1;
  string config_key = 2;
  string config_value = 3;
  string remark = 4;
  int64 create_times = 5;
}

message TenantConfigListReq {
  common.PageReq page = 1;
  string keyword = 2;
}
message TenantConfigListResp {
  common.RespBase base = 1;
  repeated TenantConfigItem data = 4;
}

message TenantConfigDetailReq {
  optional int64 id = 1;
  optional tenant.TenantConfigType config_key = 2;
}

message TenantConfigDetailResp {
  common.RespBase base = 1;
  TenantConfigItem data = 3;
}

message TenantConfigByKeysReq { repeated string config_keys = 1; }
message TenantConfigByKeysResp {
  common.RespBase base = 1;
  repeated TenantConfigItem data = 3;
}

message LoginUserPermsReq { int64 user_id = 1; }
message LoginUserPermsResp { repeated string perms = 1; }


//////////////////////
// Service
//////////////////////
service Tenant {
  // P0
  rpc TenantLogin(TenantLoginReq) returns (TenantLoginResp);
  // 获取当前租户信息
  rpc GetProfile(ProfileReq) returns (ProfileResp);
  // 修改头像，密码，昵称
  rpc UpdateProfile(UpdateProfileReq) returns (RespBase);

  // 2FA
  rpc Google2FAInit(Google2FAInitReq) returns (Google2FAInitResp);
  // 绑定Google 2FA
  rpc Google2FABind(Google2FABindReq) returns (RespBase);
  // 启用Google 2FA
  rpc Google2FAEnable(Google2FAEnableReq) returns (RespBase);
  // 禁用Google 2FA
  rpc Google2FADisable(Google2FADisableReq) returns (RespBase);
  // 重置Google 2FA
  rpc Google2FAReset(Google2FAResetReq) returns (RespBase);

  // 租户
  rpc TenantUserList(TenantUserListReq) returns (TenantUserListResp);
  // 获取租户详情
  rpc TenantUserDetail(TenantUserDetailReq) returns (TenantUserDetailResp);
  // 创建系统租户
  rpc TenantUserCreate(TenantUserCreateReq) returns (RespBase);
  // 更新系统租户
  rpc TenantUserUpdate(TenantUserUpdateReq) returns (RespBase);
  // 删除系统租户
  rpc TenantUserDelete(TenantUserDeleteReq) returns (RespBase);
  // 修改租户状态
  rpc ChangeUserStatus(ChangeUserStatusReq) returns (RespBase);
  // 重置租户密码
  rpc ResetUserPwd(ResetUserPwdReq) returns (RespBase);
  // 分配租户角色
  rpc AssignUserRoles(AssignUserRolesReq) returns (RespBase);

  // 角色
  rpc TenantRoleList(TenantRoleListReq) returns (TenantRoleListResp);
  // 创建角色
  rpc TenantRoleCreate(TenantRoleCreateReq) returns (RespBase);
  // 更新角色
  rpc TenantRoleUpdate(TenantRoleUpdateReq) returns (RespBase);
  // 删除角色
  rpc TenantRoleDelete(TenantRoleDeleteReq) returns (RespBase);
  // 角色授权
  rpc TenantRoleGrant(TenantRoleGrantReq) returns (RespBase);
  // 获取角色授权详情
  rpc TenantRoleGrantDetail(TenantRoleGrantDetailReq)
      returns (TenantRoleGrantDetailResp);
  // 获取权限列表
  rpc TenantPermList(Empty) returns (TenantPermListResp);
  // 获取菜单树
  rpc GetMenuTree(Empty) returns (TenantMenuTreeResp);
  // 菜单
  rpc TenantMenuCreate(TenantMenuCreateReq) returns (RespBase);
  // 更新菜单
  rpc TenantMenuUpdate(TenantMenuUpdateReq) returns (RespBase);
  // 删除菜单
  rpc TenantMenuDelete(TenantMenuDeleteReq) returns (RespBase);
  // 获取菜单列表
  rpc TenantMenuList(TenantMenuListReq) returns (TenantMenuListResp);
  // 日志
  rpc LoginLogList(LoginLogListReq) returns (LoginLogListResp);
  // 操作日志
  rpc OpLogList(OpLogListReq) returns (OpLogListResp);
  // 新增系统配置
  rpc TenantConfigCreate(TenantConfigCreateReq) returns (RespBase);
  // 更新系统配置
  rpc TenantConfigUpdate(TenantConfigUpdateReq) returns (RespBase);
  // 删除系统配置
  rpc TenantConfigDelete(TenantConfigDeleteReq) returns (RespBase);
  // 获取系统配置列表
  rpc TenantConfigList(TenantConfigListReq) returns (TenantConfigListResp);
  // 获取系统配置详情
  rpc TenantConfigDetail(TenantConfigDetailReq) returns (TenantConfigDetailResp);
  // 获取系统配置根据keys
  rpc TenantConfigByKeys(TenantConfigByKeysReq) returns (TenantConfigByKeysResp);
  // 获取登录租户的权限列表
  rpc LoginUserPerms(LoginUserPermsReq) returns (LoginUserPermsResp);
}
