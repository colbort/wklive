syntax = "proto3";

package tenant;

option go_package = "wklive/proto/tenant;tenant";

enum TenantConfigType {
  UNKNOWN = 0;
  SYSTEM_CORE = 1; // 系统配置
  OBJECT_STORAGE = 2; // 对象存储配置
}

enum CommonStatus {
  COMMON_STATUS_UNKNOWN = 0;
  COMMON_STATUS_ENABLED = 1; // 启用
  COMMON_STATUS_DISABLED = 2; // 禁用
}

enum MenuType {
  MENU_TYPE_UNKNOWN = 0;
  MENU_TYPE_DIR = 1; // 目录
  MENU_TYPE_MENU = 2; // 菜单
  MENU_TYPE_BUTTON = 3; // 按钮
}

enum VisibleStatus {
  VISIBLE_STATUS_UNKNOWN = 0;
  VISIBLE_STATUS_VISIBLE = 1; // 显示
  VISIBLE_STATUS_HIDDEN = 2; // 隐藏
}

enum RequestMethod {
  REQUEST_METHOD_UNKNOWN = 0;
  REQUEST_METHOD_GET = 1;
  REQUEST_METHOD_POST = 2;
  REQUEST_METHOD_PUT = 3;
  REQUEST_METHOD_DELETE = 4;
}