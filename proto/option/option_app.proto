syntax = "proto3";

package option;

import "proto/common/common.proto";
import "proto/option/enum.proto";
import "proto/option/model.proto";

option go_package = "wklive/proto/option;option";

// 期权 APP 端服务
service OptionApp {
  // 获取可交易期权合约列表
  rpc AppListContracts(AppListContractsReq) returns (AppListContractsResp);

  // 获取期权合约详情
  rpc AppGetContractDetail(AppGetContractDetailReq)
      returns (AppGetContractDetailResp);

  // 提交期权下单请求
  rpc AppPlaceOrder(AppPlaceOrderReq) returns (AppPlaceOrderResp);

  // 撤销期权委托订单
  rpc AppCancelOrder(AppCancelOrderReq) returns (AppCommonResp);

  // 获取单个委托订单详情
  rpc AppGetOrderDetail(AppGetOrderDetailReq) returns (AppGetOrderDetailResp);

  // 获取当前委托列表
  rpc AppListCurrentOrders(AppListCurrentOrdersReq)
      returns (AppListCurrentOrdersResp);

  // 获取历史委托列表
  rpc AppListHistoryOrders(AppListHistoryOrdersReq)
      returns (AppListHistoryOrdersResp);

  // 获取成交记录列表
  rpc AppListTrades(AppListTradesReq) returns (AppListTradesResp);

  // 获取持仓列表
  rpc AppListPositions(AppListPositionsReq) returns (AppListPositionsResp);

  // 获取单个持仓详情
  rpc AppGetPositionDetail(AppGetPositionDetailReq)
      returns (AppGetPositionDetailResp);

  // 发起行权
  rpc AppExercise(AppExerciseReq) returns (AppExerciseResp);

  // 获取行权记录列表
  rpc AppListExercises(AppListExercisesReq) returns (AppListExercisesResp);

  // 获取账户资产列表
  rpc AppListAccounts(AppListAccountsReq) returns (AppListAccountsResp);

  // 获取资金流水列表
  rpc AppListBills(AppListBillsReq) returns (AppListBillsResp);
}

message AppCommonResp { common.RespBase base = 1; }

message AppListContractsReq {
  string underlying_symbol = 1;
  OptionType option_type = 2;
  ContractStatus status = 3;
  common.PageReq page = 4;
}

message AppListContractsResp {
  common.RespBase base = 1;
  repeated OptionContractDetail data = 2;
}

message AppGetContractDetailReq {
  int64 contract_id = 1;
}

message AppGetContractDetailResp {
  common.RespBase base = 1;
  OptionContractDetail data = 2;
}

message AppPlaceOrderReq {
  int64 account_id = 1;
  int64 contract_id = 2;
  Side side = 3;
  PositionEffect position_effect = 4;
  OrderType order_type = 5;
  string price = 6;
  string qty = 7;
  string client_order_id = 8;
  YesNo reduce_only = 9;
  YesNo mmp = 10;
}

message AppPlaceOrderResp {
  common.RespBase base = 1;
  AppPlaceOrderData data = 2;
}

message AppPlaceOrderData {
  string order_no = 1;
  int64 order_id = 2;
}

message AppCancelOrderReq {
  int64 account_id = 1;
  int64 order_id = 2;
  string order_no = 3;
}

message AppGetOrderDetailReq {
  int64 account_id = 1;
  int64 order_id = 2;
  string order_no = 3;
}

message AppGetOrderDetailResp {
  common.RespBase base = 1;
  OptionOrderDetail data = 2;
}

message AppListCurrentOrdersReq {
  int64 account_id = 1;
  int64 contract_id = 2;
  Side side = 3;
  common.PageReq page = 4;
}

message AppListCurrentOrdersResp {
  common.RespBase base = 1;
  repeated OptionOrderDetail data = 2;
}

message AppListHistoryOrdersReq {
  int64 account_id = 1;
  int64 contract_id = 2;
  OrderStatus status = 3;
  common.TimeRange create_time_range = 4;
  common.PageReq page = 5;
}

message AppListHistoryOrdersResp {
  common.RespBase base = 1;
  repeated OptionOrderDetail data = 2;
}

message AppListTradesReq {
  int64 account_id = 1;
  int64 contract_id = 2;
  common.TimeRange trade_time_range = 3;
  common.PageReq page = 4;
}

message AppListTradesResp {
  common.RespBase base = 1;
  repeated OptionTradeDetail data = 2;
}

message AppListPositionsReq {
  int64 account_id = 1;
  PositionStatus status = 2;
  common.PageReq page = 3;
}

message AppListPositionsResp {
  common.RespBase base = 1;
  repeated OptionPositionDetail data = 2;
}

message AppGetPositionDetailReq {
  int64 account_id = 1;
  int64 position_id = 2;
}

message AppGetPositionDetailResp {
  common.RespBase base = 1;
  OptionPositionDetail data = 2;
}

message AppExerciseReq {
  int64 account_id = 1;
  int64 position_id = 2;
  int64 contract_id = 3;
  string exercise_qty = 4;
}

message AppExerciseResp {
  common.RespBase base = 1;
  AppExerciseData data = 2;
}

message AppExerciseData {
  string exercise_no = 1;
  int64 exercise_id = 2;
}

message AppListExercisesReq {
  int64 account_id = 1;
  int64 contract_id = 2;
  ExerciseStatus status = 3;
  common.TimeRange exercise_time_range = 4;
  common.PageReq page = 5;
}

message AppListExercisesResp {
  common.RespBase base = 1;
  repeated OptionExerciseDetail data = 2;
}

message AppListAccountsReq {
  int64 account_id = 1;
}

message AppListAccountsResp {
  common.RespBase base = 1;
  repeated OptionAccount data = 2;
}

message AppListBillsReq {
  int64 account_id = 1;
  BillRefType ref_type = 2;
  common.TimeRange create_time_range = 3;
  common.PageReq page = 4;
}

message AppListBillsResp {
  common.RespBase base = 1;
  repeated OptionBill data = 2;
}