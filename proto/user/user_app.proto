syntax = "proto3";

package user;

import "proto/common/common.proto";
import "proto/user/enum.proto";
import "proto/user/model.proto";

option go_package = "wklive/proto/user;user";

message AppCommonResp { common.RespBase base = 1; }

message RegisterReq {
  string tenant_code = 1;
  user.RegisterType register_type = 2;
  string username = 3;
  string phone = 4;
  string email = 5;
  string password = 6;
  string confirm_password = 7;
  string invite_code = 8;
  string source = 9;
}

message RegisterResp {
  common.RespBase base = 1;
  RegisterData data = 2;
}

message RegisterData {
  int64 user_id = 1;
  common.TokenInfo token = 2;
  user.UserProfile profile = 3;
}

message LoginReq {
  string tenant_code = 1;
  user.LoginType login_type = 2;
  string account = 3;
  string password = 4;
  string google_code = 5;
}

message LoginResp {
  common.RespBase base = 1;
  LoginData data = 2;
}

message LoginData {
  int64 user_id = 1;
  common.TokenInfo token = 2;
  user.UserProfile profile = 3;
}

message GuestLoginReq {
  string device_id = 1;
  string fingerprint = 2;
  string tenant_code = 3;
}

message GuestLogin {
  string token = 1;
  string user_id = 2;
  bool is_new = 3;
  string username = 4;
}

message GuestLoginResp {
  common.RespBase base = 1;
  GuestLogin data = 2;
}

message LogoutReq { }

message RefreshTokenReq {
  string tenant_code = 1;
  string refresh_token = 2;
}

message RefreshTokenResp {
  common.RespBase base = 1;
  common.TokenInfo data = 2;
}

message GetProfileReq { }

message GetProfileResp {
  common.RespBase base = 1;
  user.UserProfile data = 2;
}

message UpdateProfileReq {
  string nickname = 1;
  string avatar = 2;
  string language = 3;
  string timezone = 4;
  string signature = 5;
  user.Gender gender = 6;
  int64 birthday = 7;
  string country_code = 8;
  string province = 9;
  string city = 10;
  string address = 11;
}

message UpdateProfileResp {
  common.RespBase base = 1;
  user.UserProfile data = 2;
}

message ChangeLoginPasswordReq {
  string old_password = 1;
  string new_password = 2;
  string confirm_password = 3;
}

message GetIdentityReq { }

message GetIdentityResp {
  common.RespBase base = 1;
  user.UserIdentity data = 2;
}

message SubmitIdentityReq {
  string phone = 1;
  string email = 2;
  string real_name = 3;
  user.Gender gender = 4;
  int64 birthday = 5;
  string country_code = 6;
  string province = 7;
  string city = 8;
  string address = 9;
  user.IdType id_type = 10;
  string id_no = 11;
  string front_image = 12;
  string back_image = 13;
  string handheld_image = 14;
}

message SubmitIdentityResp {
  common.RespBase base = 1;
  user.UserIdentity data = 2;
}

message UpdateIdentityReq {
  string phone = 1;
  string email = 2;
  string real_name = 3;
  user.Gender gender = 4;
  int64 birthday = 5;
  string country_code = 6;
  string province = 7;
  string city = 8;
  string address = 9;
}

message UpdateIdentityResp {
  common.RespBase base = 1;
  user.UserIdentity data = 2;
}

message GetSecurityReq { }

message GetSecurityResp {
  common.RespBase base = 1;
  user.UserSecurity data = 2;
}

message SetPayPasswordReq {
  string password = 1;
  string confirm_password = 2;
}

message ChangePayPasswordReq {
  string old_password = 1;
  string new_password = 2;
  string confirm_password = 3;
}

message InitGoogle2FAReq { }

message InitGoogle2FAResp {
  common.RespBase base = 1;
  InitGoogle2FAData data = 2;
}

message InitGoogle2FAData {
  string secret = 1;
  string qr_code_url = 2;
}

message EnableGoogle2FAReq {
  string google_code = 1;
}

message DisableGoogle2FAReq {
  string google_code = 1;
}

message ListBanksReq {
  common.PageReq page = 1;
}

message ListBanksResp {
  common.RespBase base = 1;
  repeated user.UserBankItem data = 2;
}

message AddBankReq {
  string bank_name = 1;
  string bank_code = 2;
  string account_name = 3;
  string account_no = 4;
  string branch_name = 5;
  string country_code = 6;
  int64 is_default = 7;
}

message AddBankResp {
  common.RespBase base = 1;
  user.UserBankItem data = 2;
}

message UpdateBankReq {
  int64 id = 1;
  string bank_name = 2;
  string bank_code = 3;
  string account_name = 4;
  string account_no = 5;
  string branch_name = 6;
  string country_code = 7;
  int64 is_default = 8;
}

message UpdateBankResp {
  common.RespBase base = 1;
  user.UserBankItem data = 2;
}

message DeleteBankReq {
  int64 id = 1;
}

message SetDefaultBankReq {
  int64 id = 1;
}

// APP端接口
service UserApp {
  // 用户注册
  rpc Register(RegisterReq) returns (RegisterResp);
  // 用户登录
  rpc Login(LoginReq) returns (LoginResp);
  // 游客登了
  rpc GuestLogin(GuestLoginReq) returns (GuestLoginResp);
  // 用户登出
  rpc Logout(LogoutReq) returns (AppCommonResp);
  // 刷新Token
  rpc RefreshToken(RefreshTokenReq) returns (RefreshTokenResp);

  // 用户资料相关接口
  rpc GetProfile(GetProfileReq) returns (GetProfileResp);
  // 更新用户资料
  rpc UpdateProfile(UpdateProfileReq) returns (UpdateProfileResp);
  // 修改登录密码
  rpc ChangeLoginPassword(ChangeLoginPasswordReq) returns (AppCommonResp);

  // 实名认证相关接口
  rpc GetIdentity(GetIdentityReq) returns (GetIdentityResp);
  // 提交实名认证信息
  rpc SubmitIdentity(SubmitIdentityReq) returns (SubmitIdentityResp);
  // 修改实名认证信息
  rpc UpdateIdentity(UpdateIdentityReq) returns (UpdateIdentityResp);

  // 安全设置相关接口
  rpc GetSecurity(GetSecurityReq) returns (GetSecurityResp);
  // 设置支付密码
  rpc SetPayPassword(SetPayPasswordReq) returns (AppCommonResp);
  // 修改支付密码
  rpc ChangePayPassword(ChangePayPasswordReq) returns (AppCommonResp);
  // 初始化谷歌2FA
  rpc InitGoogle2FA(InitGoogle2FAReq) returns (InitGoogle2FAResp);
  // 启用谷歌2FA
  rpc EnableGoogle2FA(EnableGoogle2FAReq) returns (AppCommonResp);
  // 禁用谷歌2FA
  rpc DisableGoogle2FA(DisableGoogle2FAReq) returns (AppCommonResp);

  // 银行卡相关接口
  rpc ListBanks(ListBanksReq) returns (ListBanksResp);
  // 添加银行卡
  rpc AddBank(AddBankReq) returns (AddBankResp);
  // 更新银行卡
  rpc UpdateBank(UpdateBankReq) returns (UpdateBankResp);
  // 删除银行卡
  rpc DeleteBank(DeleteBankReq) returns (AppCommonResp);
  // 设置默认银行卡
  rpc SetDefaultBank(SetDefaultBankReq) returns (AppCommonResp);
}
