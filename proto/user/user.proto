syntax = "proto3";

package user;


option go_package = "wklive/proto/user;user";

message Empty {}

message RespBase { 
  int32 code = 1; 
  string msg = 2; 
  int64 total = 3; 
  bool has_next = 4;
  bool has_prev = 5;
  int64 next_cursor = 6;
  int64 prev_cursor = 7;
}

message PageReq { int64 cursor = 1; int64 limit = 2; }

message RegisterReq {
  
}

message RegisterResp {
  
}

message LoginReq {
  
}

message LoginResp {
  
}

message GetUserProfileReq {
  
}

message GetUserProfileResp {
  
}

message UpdateProfileReq {
  
}

message UpdateProfileResp {
  
}


// 用户服务
service User {
    // 注册
rpc Register(RegisterReq) returns (RegisterResp);
    // 登录
  rpc Login(LoginReq) returns (LoginResp);
  // 获取用户信息
  rpc GetUserProfile(GetUserProfileReq) returns (GetUserProfileResp);
    // 更新用户信息
  rpc UpdateProfile(UpdateProfileReq) returns (UpdateProfileResp);
}