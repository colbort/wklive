syntax = "proto3";

package user;

import "proto/user/common.proto";
import "proto/user/model.proto";

option go_package = "wklive/proto/user;user";

message AdminCommonResp {
  user.RespBase base = 1;
}

message CreateUserReq {
  int64 tenant_id = 1;
  string username = 2;
  string nickname = 3;
  string avatar = 4;
  string phone = 5;
  string email = 6;
  string password = 7;
  user.RegisterType register_type = 8;
  user.UserStatus status = 9;
  int32 member_level = 10;
  string language = 11;
  string timezone = 12;
  string invite_code = 13;
  string signature = 14;
  string source = 15;
  int64 referrer_user_id = 16;
  string remark = 17;
}

message CreateUserResp {
  user.RespBase base = 1;
  int64 user_id = 2;
}

message GetUserDetailReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message GetUserDetailResp {
  user.RespBase base = 1;
  user.UserDetail detail = 2;
}

message ListUsersReq {
  user.PageReq page = 1;
  int64 tenant_id = 2;
  string tenant_code = 3;
  string keyword = 4;
  int64 user_id = 5;
  string user_no = 6;
  string username = 7;
  string phone = 8;
  string email = 9;
  user.UserStatus status = 10;
  int32 member_level = 11;
  user.VerifyStatus verify_status = 12;
  user.KycLevel kyc_level = 13;
  string invite_code = 14;
  int64 register_time_start = 15;
  int64 register_time_end = 16;
}

message ListUsersResp {
  user.RespBase base = 1;
  repeated user.UserListItem list = 2;
}

message UpdateUserBaseReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string username = 3;
  string nickname = 4;
  string avatar = 5;
  string language = 6;
  string timezone = 7;
  string signature = 8;
  string source = 9;
  int64 referrer_user_id = 10;
  string remark = 11;
  string phone = 12;
  string email = 13;
}

message UpdateUserBaseResp {
  user.RespBase base = 1;
  user.UserDetail detail = 2;
}

message UpdateUserStatusReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  user.UserStatus status = 3;
  string remark = 4;
}

message UpdateUserLevelReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  int32 member_level = 3;
}

message ResetLoginPasswordReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string new_password = 3;
}

message ResetPayPasswordReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string new_pay_password = 3;
}

message UnlockUserReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message UpdateRiskLevelReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  user.RiskLevel risk_level = 3;
}

message DeleteUserReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message GetUserSecurityReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message GetUserSecurityResp {
  user.RespBase base = 1;
  user.UserSecurity security = 2;
}

message ResetUserGoogle2FAReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
}

message ListUserIdentitiesReq {
  user.PageReq page = 1;
  int64 tenant_id = 2;
  string tenant_code = 3;
  string keyword = 4;
  int64 user_id = 5;
  string user_no = 6;
  string username = 7;
  string phone = 8;
  string email = 9;
  string real_name = 10;
  user.VerifyStatus verify_status = 11;
  user.KycLevel kyc_level = 12;
  user.IdType id_type = 13;
}

message ListUserIdentitiesResp {
  user.RespBase base = 1;
  repeated user.UserIdentityListItem list = 2;
}

message ReviewUserIdentityReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  user.VerifyStatus verify_status = 3;
  string reject_reason = 4;
  int64 verify_by = 5;
}

message ReviewUserIdentityResp {
  user.RespBase base = 1;
  user.UserIdentity identity = 2;
}

message ListUserBanksReq {
  user.PageReq page = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string keyword = 4;
  user.BankStatus status = 5;
}

message ListUserBanksResp {
  user.RespBase base = 1;
  repeated user.UserBankListItem list = 2;
}

message GetUserBankReq {
  int64 tenant_id = 1;
  int64 id = 2;
}

message GetUserBankResp {
  user.RespBase base = 1;
  user.UserBank bank = 2;
}

message AddUserBankReq {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string bank_name = 3;
  string bank_code = 4;
  string account_name = 5;
  string account_no = 6;
  string branch_name = 7;
  string country_code = 8;
  bool is_default = 9;
  user.BankStatus status = 10;
}

message AddUserBankResp {
  user.RespBase base = 1;
  user.UserBank bank = 2;
}

message UpdateUserBankReq {
  int64 tenant_id = 1;
  int64 id = 2;
  int64 user_id = 3;
  string bank_name = 4;
  string bank_code = 5;
  string account_name = 6;
  string account_no = 7;
  string branch_name = 8;
  string country_code = 9;
  bool is_default = 10;
  user.BankStatus status = 11;
}

message UpdateUserBankResp {
  user.RespBase base = 1;
  user.UserBank bank = 2;
}

message DeleteUserBankReq {
  int64 tenant_id = 1;
  int64 id = 2;
}

message UpdateUserBankStatusReq {
  int64 tenant_id = 1;
  int64 id = 2;
  user.BankStatus status = 3;
}

message SetDefaultUserBankReq {
  int64 tenant_id = 1;
  int64 id = 2;
  int64 user_id = 3;
}

// 管理后台接口
service UserAdmin {
  // 用户管理接口
  rpc CreateUser(CreateUserReq) returns (CreateUserResp);
  // 获取用户详情
  rpc GetUserDetail(GetUserDetailReq) returns (GetUserDetailResp);
  // 用户列表
  rpc ListUsers(ListUsersReq) returns (ListUsersResp);
  // 更新用户基本信息
  rpc UpdateUserBase(UpdateUserBaseReq) returns (UpdateUserBaseResp);
  // 更新用户状态
  rpc UpdateUserStatus(UpdateUserStatusReq) returns (AdminCommonResp);
  // 更新用户会员等级
  rpc UpdateUserLevel(UpdateUserLevelReq) returns (AdminCommonResp);
  // 重置登录密码
  rpc ResetLoginPassword(ResetLoginPasswordReq) returns (AdminCommonResp);
  // 重置支付密码
  rpc ResetPayPassword(ResetPayPasswordReq) returns (AdminCommonResp);
  // 解锁用户（解除登录锁定）
  rpc UnlockUser(UnlockUserReq) returns (AdminCommonResp);
  // 更新用户风险等级
  rpc UpdateRiskLevel(UpdateRiskLevelReq) returns (AdminCommonResp);
  // 删除用户
  rpc DeleteUser(DeleteUserReq) returns (AdminCommonResp);

  // 获取用户安全设置
  rpc GetUserSecurity(GetUserSecurityReq) returns (GetUserSecurityResp);
  // 重置用户谷歌2FA
  rpc ResetUserGoogle2FA(ResetUserGoogle2FAReq) returns (AdminCommonResp);

  // 实名认证相关接口
  rpc ListUserIdentities(ListUserIdentitiesReq) returns (ListUserIdentitiesResp);
  // 审核实名认证信息
  rpc ReviewUserIdentity(ReviewUserIdentityReq) returns (ReviewUserIdentityResp);

  // 银行卡相关接口
  rpc ListUserBanks(ListUserBanksReq) returns (ListUserBanksResp);
  // 获取用户银行卡详情
  rpc GetUserBank(GetUserBankReq) returns (GetUserBankResp);
  // 添加用户银行卡
  rpc AddUserBank(AddUserBankReq) returns (AddUserBankResp);
  // 更新用户银行卡
  rpc UpdateUserBank(UpdateUserBankReq) returns (UpdateUserBankResp);
  // 删除用户银行卡
  rpc DeleteUserBank(DeleteUserBankReq) returns (AdminCommonResp);
  // 更新用户银行卡状态
  rpc UpdateUserBankStatus(UpdateUserBankStatusReq) returns (AdminCommonResp);
  // 设置默认用户银行卡
  rpc SetDefaultUserBank(SetDefaultUserBankReq) returns (AdminCommonResp);
}
