syntax = "proto3";

package trade;

option go_package = "wklive/proto/trade;trade";

import "proto/common/common.proto";

message TradeTaskReq {
  int64 tenant_id = 1;
}

message TradeTaskResp {
  common.RespBase base = 1;
}

// ====================
// 定时任务
// ====================
service TradeTask {
  // 订单撮合
  rpc ProcessOrderMatching(TradeTaskReq) returns (TradeTaskResp);
  // 仓位处理（标记价格刷新/强平扫描/普通平仓）
  rpc ProcessPositions(TradeTaskReq) returns (TradeTaskResp);
  // 合约结算（资金费率/交割合约/秒合约）
  rpc ProcessContractSettlements(TradeTaskReq) returns (TradeTaskResp);
  // 交易事件处理（失败重试/冻结资产修复）
  rpc ProcessTradeEvents(TradeTaskReq) returns (TradeTaskResp);
  // 风控限制过期恢复
  rpc ExpireRiskLimits(TradeTaskReq) returns (TradeTaskResp);
}
