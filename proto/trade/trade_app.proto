syntax = "proto3";

package trade;

option go_package = "wklive/proto/trade;trade";

import "proto/common/common.proto";
import "proto/trade/enum.proto";
import "proto/trade/model.proto";

// APP 交易服务接口
service TradeApp {
  // 获取交易对列表
  rpc GetSymbolList(GetSymbolListReq) returns (GetSymbolListResp);

  // 获取指定交易对详情
  rpc GetSymbolDetail(GetSymbolDetailReq) returns (GetSymbolDetailResp);

  // 下单
  rpc PlaceOrder(PlaceOrderReq) returns (PlaceOrderResp);

  // 撤销指定订单
  rpc CancelOrder(CancelOrderReq) returns (AppCommonResp);

  // 撤销当前用户全部订单
  rpc CancelAllOrders(CancelAllOrdersReq) returns (CancelAllOrdersResp);

  // 获取订单列表
  rpc GetOrderList(GetOrderListReq) returns (GetOrderListResp);

  // 获取订单详情
  rpc GetOrderDetail(GetOrderDetailReq) returns (GetOrderDetailResp);

  // 获取成交记录列表
  rpc GetFillList(GetFillListReq) returns (GetFillListResp);

  // 获取持仓列表
  rpc GetPositionList(GetPositionListReq) returns (GetPositionListResp);

  // 获取保证金账户列表
  rpc GetMarginAccountList(GetMarginAccountListReq) returns (GetMarginAccountListResp);

  // 获取当前杠杆配置
  rpc GetLeverageConfig(GetLeverageConfigReq) returns (GetLeverageConfigResp);

  // 设置杠杆倍数
  rpc SetLeverage(SetLeverageReq) returns (AppCommonResp);
}

message AppCommonResp {
  common.RespBase base = 1;
}

message GetSymbolListReq {
  uint64 tenant_id = 1;
  MarketType market_type = 2;
  SymbolStatus status = 3;
}

message GetSymbolListResp {
  common.RespBase base = 1;
  repeated TradeSymbol list = 2;
}

message GetSymbolDetailReq {
  uint64 tenant_id = 1;
  uint64 symbol_id = 2;
}

message GetSymbolDetailResp {
  common.RespBase base = 1;
  TradeSymbol symbol = 2;
  TradeSymbolSpot spot = 3;
  TradeSymbolContract contract = 4;
}

message PlaceOrderReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  uint64 symbol_id = 3;
  MarketType market_type = 4;
  TradeSide side = 5;
  PositionSide position_side = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  string client_order_id = 9;
  string price = 10;
  string qty = 11;
  string amount = 12;
  bool is_reduce_only = 13;
  bool is_close_only = 14;
  string trigger_price = 15;
  TriggerType trigger_type = 16;
  MarginMode margin_mode = 17;
  uint32 leverage = 18;
  string take_profit_price = 19;
  string stop_loss_price = 20;
  OrderSourceType order_source = 21;
}

message PlaceOrderResp {
  common.RespBase base = 1;
  TradeOrder order = 2;
}

message CancelOrderReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  uint64 order_id = 3;
  string order_no = 4;
  string client_order_id = 5;
}

message CancelAllOrdersReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  MarketType market_type = 3;
  uint64 symbol_id = 4;
  TradeSide side = 5;
  PositionSide position_side = 6;
}

message CancelAllOrdersResp {
  common.RespBase base = 1;
  uint32 affected_count = 2;
}

message GetOrderListReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  common.PageReq page = 3;
  MarketType market_type = 4;
  uint64 symbol_id = 5;
  OrderStatus status = 6;
  TradeSide side = 7;
  TimeRange time_range = 8;
}

message GetOrderListResp {
  common.RespBase base = 1;
  repeated TradeOrder list = 2;
}

message GetOrderDetailReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  uint64 order_id = 3;
  string order_no = 4;
}

message GetOrderDetailResp {
  common.RespBase base = 1;
  TradeOrder order = 2;
  TradeOrderSpot spot = 3;
  TradeOrderContract contract = 4;
}

message GetFillListReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  common.PageReq page = 3;
  MarketType market_type = 4;
  uint64 symbol_id = 5;
  TimeRange time_range = 6;
}

message GetFillListResp {
  common.RespBase base = 1;
  repeated TradeFill list = 2;
}

message GetPositionListReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  MarketType market_type = 3;
  uint64 symbol_id = 4;
}

message GetPositionListResp {
  common.RespBase base = 1;
  repeated ContractPosition list = 2;
}

message GetMarginAccountListReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  MarketType market_type = 3;
  string margin_asset = 4;
}

message GetMarginAccountListResp {
  common.RespBase base = 1;
  repeated ContractMarginAccount list = 2;
}

message GetLeverageConfigReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  uint64 symbol_id = 3;
  MarketType market_type = 4;
  MarginMode margin_mode = 5;
}

message GetLeverageConfigResp {
  common.RespBase base = 1;
  ContractLeverageConfig data = 2;
}

message SetLeverageReq {
  uint64 tenant_id = 1;
  uint64 user_id = 2;
  uint64 symbol_id = 3;
  MarketType market_type = 4;
  MarginMode margin_mode = 5;
  PositionMode position_mode = 6;
  uint32 long_leverage = 7;
  uint32 short_leverage = 8;
}