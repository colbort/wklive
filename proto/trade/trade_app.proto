syntax = "proto3";

package trade;

option go_package = "wklive/proto/trade;trade";

import "proto/common/common.proto";
import "proto/trade/enum.proto";
import "proto/trade/model.proto";

// APP 交易服务接口
service TradeApp {
  // 获取交易对列表
  rpc GetSymbolList(GetSymbolListReq) returns (GetSymbolListResp);

  // 获取指定交易对详情
  rpc GetSymbolDetail(GetSymbolDetailReq) returns (GetSymbolDetailResp);

  // 下单
  rpc PlaceOrder(PlaceOrderReq) returns (PlaceOrderResp);

  // 撤销指定订单
  rpc CancelOrder(CancelOrderReq) returns (AppCommonResp);

  // 撤销当前用户全部订单
  rpc CancelAllOrders(CancelAllOrdersReq) returns (CancelAllOrdersResp);

  // 获取订单列表
  rpc GetOrderList(GetOrderListReq) returns (GetOrderListResp);

  // 获取订单详情
  rpc GetOrderDetail(GetOrderDetailReq) returns (GetOrderDetailResp);

  // 获取成交记录列表
  rpc GetFillList(GetFillListReq) returns (GetFillListResp);

  // 获取持仓列表
  rpc GetPositionList(GetPositionListReq) returns (GetPositionListResp);

  // 获取保证金账户列表
  rpc GetMarginAccountList(GetMarginAccountListReq)
      returns (GetMarginAccountListResp);

  // 获取当前杠杆配置
  rpc GetLeverageConfig(GetLeverageConfigReq) returns (GetLeverageConfigResp);

  // 设置杠杆倍数
  rpc SetLeverage(SetLeverageReq) returns (AppCommonResp);
}

message AppCommonResp { common.RespBase base = 1; }

message GetSymbolListReq {
  MarketType market_type = 1;
  SymbolStatus status = 2;
}

message GetSymbolListResp {
  common.RespBase base = 1;
  repeated TradeSymbol data = 2;
}

message GetSymbolDetailReq {
  int64 symbol_id = 1;
}

message GetSymbolDetailResp {
  common.RespBase base = 1;
  GetSymbolDetailData data = 2;
}

message GetSymbolDetailData {
  TradeSymbol symbol = 1;
  TradeSymbolSpot spot = 2;
  TradeSymbolContract contract = 3;
  repeated TradeSymbolLeverageConfig leverage_configs = 4;
}

message PlaceOrderReq {
  int64 symbol_id = 1;
  MarketType market_type = 2;
  common.Side side = 3; // 买卖方向
  PositionSide position_side = 4;
  OrderType order_type = 5;
  TimeInForce time_in_force = 6;
  string client_order_id = 7;
  string price = 8;
  string qty = 9;
  string amount = 10;
  int64 is_reduce_only = 11;
  int64 is_close_only = 12;
  string trigger_price = 13;
  TriggerType trigger_type = 14;
  MarginMode margin_mode = 15;
  int64 leverage = 16;
  string take_profit_price = 17;
  string stop_loss_price = 18;
  OrderSourceType order_source = 19;
  TriggerKind trigger_kind = 20;
}

message PlaceOrderResp {
  common.RespBase base = 1;
  TradeOrder data = 2;
}

message CancelOrderReq {
  int64 order_id = 1;
  string order_no = 2;
  string client_order_id = 3;
}

message CancelAllOrdersReq {
  MarketType market_type = 1;
  int64 symbol_id = 2;
  common.Side side = 3; // 买卖方向
  PositionSide position_side = 4;
}

message CancelAllOrdersResp {
  common.RespBase base = 1;
  int64 data = 2;
}

message GetOrderListReq {
  common.PageReq page = 1;
  MarketType market_type = 2;
  int64 symbol_id = 3;
  OrderStatus status = 4;
  common.Side side = 5; // 买卖方向
  TimeRange time_range = 6;
}

message GetOrderListResp {
  common.RespBase base = 1;
  repeated TradeOrder data = 2;
}

message GetOrderDetailReq {
  int64 order_id = 1;
  string order_no = 2;
}

message GetOrderDetailResp {
  common.RespBase base = 1;
  GetOrderDetailData data = 2;
}

message GetOrderDetailData {
  TradeOrder order = 1;
  TradeOrderSpot spot = 2;
  TradeOrderContract contract = 3;
}

message GetFillListReq {
  common.PageReq page = 1;
  MarketType market_type = 2;
  int64 symbol_id = 3;
  TimeRange time_range = 4;
}

message GetFillListResp {
  common.RespBase base = 1;
  repeated TradeFill data = 2;
}

message GetPositionListReq {
  MarketType market_type = 1;
  int64 symbol_id = 2;
}

message GetPositionListResp {
  common.RespBase base = 1;
  repeated ContractPosition data = 2;
}

message GetMarginAccountListReq {
  MarketType market_type = 1;
  string margin_asset = 2;
}

message GetMarginAccountListResp {
  common.RespBase base = 1;
  repeated ContractMarginAccount data = 2;
}

message GetLeverageConfigReq {
  int64 symbol_id = 1;
  MarketType market_type = 2;
  MarginMode margin_mode = 3;
}

message GetLeverageConfigResp {
  common.RespBase base = 1;
  ContractLeverageConfig data = 2;
}

message SetLeverageReq {
  int64 symbol_id = 1;
  MarketType market_type = 2;
  MarginMode margin_mode = 3;
  PositionMode position_mode = 4;
  int64 long_leverage = 5;
  int64 short_leverage = 6;
}
