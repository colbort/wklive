}

enum EnableStatus {
  ENABLE_STATUS_DISABLED = 0; // 禁用
  ENABLE_STATUS_ENABLED = 1; // 启用
}

enum TriggerType {
  TRIGGER_TYPE_UNKNOWN = 0; // 无
  TRIGGER_TYPE_LAST_PRICE = 1; // 最新价
  TRIGGER_TYPE_MARK_PRICE = 2; // 标记价
  TRIGGER_TYPE_INDEX_PRICE = 3; // 指数价
}