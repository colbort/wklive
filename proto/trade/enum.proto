  POSITION_ACTION_TYPE_UNKNOWN = 0; // 未知
  POSITION_ACTION_TYPE_OPEN = 1; // 开仓
  POSITION_ACTION_TYPE_INCREASE = 2; // 加仓
  POSITION_ACTION_TYPE_DECREASE = 3; // 减仓
  POSITION_ACTION_TYPE_CLOSE = 4; // 平仓
  POSITION_ACTION_TYPE_LIQUIDATION = 5; // 强平
  POSITION_ACTION_TYPE_SETTLEMENT = 6; // 结算
  POSITION_ACTION_TYPE_FUNDING_FEE = 7; // 资金费结转
  POSITION_ACTION_TYPE_MANUAL_ADJUST = 8; // 手动调整
}

