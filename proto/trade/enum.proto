  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_CONDITIONAL = 3;
  ORDER_TYPE_TAKE_PROFIT = 4;
  ORDER_TYPE_STOP_LOSS = 5;
}

enum TimeInForce {
